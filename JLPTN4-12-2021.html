            { id: 'l7', context: '問題１: 7番', image: 'https://lh3.googleusercontent.com/d/1WW5O2uxIul7Aln4JEguLohLpiUsffl_4', q: 'この授業で学生は自分でノートを何冊用意しますか。', opts: ['1', '2', '3', '4'], ans: 1 },
            { id: 'l8', context: '問題１: 8番', image: 'https://lh3.googleusercontent.com/d/1rpmjPSeHtrcuG6S2tbBpHAm2jBofMNOA', q: '女の学生は明日何時から何時まで働きますか。', opts: ['1', '2', '3', '4'], ans: 3 },
            { id: 'l9', context: '問題２: 1番', q: '男の学生はどうしてカラオケに行きませんか。', opts: ['用事があるから', 'カラオケが嫌いだから', '今週試験があるから', 'のどが痛いから'], ans: 3 },
            { id: 'l10', context: '問題２: 2番', q: '男の学生は何を頼んでいますか。', opts: ['試合の準備を手伝ってほしい', '練習時間を延ばしてほしい', '体育館を借りてほしい', '試合に出てほしい'], ans: 0 },
            { id: 'l11', context: '問題２: 3番', q: '女の人はどうしてあまり食べないのですか。', opts: ['寿司が好きじゃない', '気分が悪い', '昼ごはんが遅かった', 'ダイエット中'], ans: 2 },
            { id: 'l12', context: '問題２: 4番', q: '女の学生は昨日どうやって買い物に行きましたか。', opts: ['バス', '車', '歩き', '自転車'], ans: 1 },
            { id: 'l13', context: '問題２: 5番', q: '課長は来週は何曜日にオフィスにいますか。', opts: ['火曜と水曜', '火曜と金曜', '水曜と金曜', '火・水・金'], ans: 0 },
            { id: 'l14', context: '問題２: 6番', q: '明日の天気はどうなると言っていますか。', opts: ['一日中雨', '一日中晴れ', '午前晴れ・午後雨', '午前雨・午後晴れ'], ans: 1 },
            { id: 'l15', context: '問題２: 7番', q: '女の人はいつ日本語の勉強を始めましたか。', opts: ['小学生のとき', '中学生のとき', '高校生のとき', '大学生のとき'], ans: 3 },
            { id: 'l16', context: '問題３: 1番', image: 'https://lh3.googleusercontent.com/d/1AIbaGpwakO-th7RWo-N5zA6MYkMzqyvu', q: '料理を作りました。友達に美味しいかどうか聞きたいです、何と言いますか。', opts: ['1', '2', '3'], ans: 1 },
            { id: 'l17', context: '問題３: 2番', image: 'https://lh3.googleusercontent.com/d/1VVFb8cIVoiuSyoWYdXJ7WejCbCxeQVtm', q: '違う電話番号に電話してしまいました、何と言いますか。', opts: ['1', '2', '3'], ans: 2 },
            { id: 'l18', context: '問題３: 3番', image: 'https://lh3.googleusercontent.com/d/1lIgtm8FHeZgsBMqIAG365x1DYCxxkc3i', q: '友達が教室の前で話しています、声が小さくて聞こえません。何と言いますか。', opts: ['1', '2', '3'], ans: 0 },
            { id: 'l19', context: '問題３: 4番', image: 'https://lh3.googleusercontent.com/d/1-LVWVKWD2NNk0YTQ4D9cnDveJyBxUEof', q: '道で前を歩いている人の手袋を拾いました、何と言いますか。', opts: ['1', '2', '3'], ans: 0 },
            { id: 'l20', context: '問題３: 5番', image: 'https://lh3.googleusercontent.com/d/1zAVJrSKRd0NCosFZmvV4CGAhiz1Q5zg4', q: '喫茶店です。広い席があるので、広い席に行きたいです。店の人に何と言いますか。', opts: ['1', '2', '3'], ans: 2 },
            { id: 'l21', context: '問題４: 1番', q: 'もう夜遅いですから。今日はそろそろ失礼します。', opts: ['ぜひまた来てくださいね', 'お邪魔します', 'ああ、いらっしゃい'], ans: 0 },
            { id: 'l22', context: '問題４: 2番', q: '先週先生に借りた本は面白かった？', opts: ['面白い先生だったよ', 'まだ全部読んでいないんだ', 'あまり白くなかった'], ans: 1 },
            { id: 'l23', context: '問題４: 3番', q: '前にこのレストランに来たことがありますか。', opts: ['レストランの前にありました', '今来たところです', 'いいえ、初めてです'], ans: 2 },
            { id: 'l24', context: '問題４: 4番', q: '林さん、困ったときは何でも言ってね。', opts: ['大変だったね', 'うん、相談するね', 'あんまり言わないほうがいい？'], ans: 1 },
            { id: 'l25', context: '問題４: 5番', q: 'この部屋ちょっと寒いよ、エアコンの温度上げてもいい？', opts: ['まだ上げていませんよ', 'すみませんが、消さないでください', 'お願いします。私も寒いです'], ans: 2 },
            { id: 'l26', context: '問題４: 6番', q: '日本語の試験、いつになったか知っている？', opts: ['九十分になったよ', '水曜日だよ', '試験があるよ'], ans: 1 },
            { id: 'l27', context: '問題４: 7番', q: '田中さん、荷物をいっぱい持っているね、一つ持とうか。', opts: ['一人で持てるので、大丈夫です', 'じゃ、一つ持ちましょう', '持ってもらえないんですか'], ans: 0 },
            { id: 'l28', context: '問題４: 8番', q: '昨日からコンピューターが壊れているんです。', opts: ['でもまだインターネットは使えませんよ', '早く直って良かったですね', '私の古いのを使いますか'], ans: 2 }
        ]
    };

    const SECTIONS = [
        { id: 'vocab', title: 'Từ vựng / Kanji', icon: 'fa-solid fa-book-open', time: 25 * 60 },
        { id: 'grammar', title: 'Ngữ pháp / Đọc', icon: 'fa-solid fa-pen-nib', time: 55 * 60 },
        { id: 'listening', title: 'Nghe hiểu', icon: 'fa-solid fa-headphones', time: 30 * 60 }
    ];

    // Modal xác nhận
    const Modal = ({ isOpen, title, message, onConfirm, onCancel }) => {
        if (!isOpen) return null;
        return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
                <div className="bg-white rounded-2xl shadow-xl max-w-sm w-full p-6">
                    <h3 className="text-xl font-bold text-slate-800 mb-2">{title}</h3>
                    <p className="text-slate-600 mb-6">{message}</p>
                    <div className="flex justify-end gap-3">
                        {onCancel && <button onClick={onCancel} className="px-4 py-2 rounded-lg font-bold text-slate-500 hover:bg-slate-100">Hủy</button>}
                        <button onClick={onConfirm} className="px-4 py-2 rounded-lg font-bold bg-blue-600 text-white hover:bg-blue-700">Đồng ý</button>
                    </div>
                </div>
            </div>
        );
    };

    function App() {
        const [currentScreen, setCurrentScreen] = useState('home');
        const [activeSection, setActiveSection] = useState('vocab');
        const [answers, setAnswers] = useState({});
        const [timeLeft, setTimeLeft] = useState(SECTIONS[0].time);
        const [modalConfig, setModalConfig] = useState({ isOpen: false });

        useEffect(() => {
            let timer;
            if (currentScreen === 'exam' && timeLeft > 0) {
                timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
            }
            return () => clearInterval(timer);
        }, [currentScreen, timeLeft]);

        const changeSection = (sectionId) => {
            setActiveSection(sectionId);
            setTimeLeft(SECTIONS.find(s => s.id === sectionId).time);
        };

        const formatTime = (sec) => {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        };

        const handleSelectAnswer = (qid, idx) => {
            setAnswers(prev => ({ ...prev, [qid]: idx }));
        };

        const calculateScore = () => {
            let totalCorrect = 0, totalQuestions = 0, sections = {};
            for (let [key, arr] of Object.entries(examData)) {
                let correct = 0;
                arr.forEach(q => { if (answers[q.id] === q.ans) correct++; });
                sections[key] = { correct, total: arr.length };
                totalCorrect += correct;
                totalQuestions += arr.length;
            }
            return { totalCorrect, totalQuestions, percentage: Math.round(totalCorrect/totalQuestions*100), sections };
        };

        const showModal = (title, msg, onConfirm, onCancel=null) => setModalConfig({ isOpen: true, title, message: msg, onConfirm, onCancel });
        const closeModal = () => setModalConfig({ isOpen: false });
        const handleSubmit = () => showModal("Nộp bài thi", "Bạn chắc chắn muốn nộp bài? Hệ thống sẽ chấm điểm toàn bộ.", () => { closeModal(); setCurrentScreen('results'); window.scrollTo(0,0); }, closeModal);

        const QuestionCard = ({ q, index, showResult }) => {
            const selected = answers[q.id];
            const isCorrect = selected === q.ans;
            const hasImage = q.image && q.image.startsWith('http');
            const isNumericOptions = q.opts.length > 0 && q.opts.every(opt => /^\d+$/.test(opt));
            
            return (
                <div className={`bg-white p-4 md:p-6 rounded-xl border mb-5 transition-all ${showResult ? (isCorrect ? 'border-green-300 bg-green-50/30' : 'border-red-300 bg-red-50/30') : (selected!==undefined ? 'border-blue-400 shadow-md' : 'border-slate-200 shadow-sm')}`}>
                    {q.context && <div className="mb-4 bg-slate-50 p-3 rounded-lg text-slate-700 text-[15px] whitespace-pre-wrap">{q.context}</div>}
                    {hasImage && (
                        <div className="mb-5 text-center">
                            <img src={q.image} alt="Hình minh họa" className="max-w-full md:max-w-md mx-auto border border-slate-200 shadow-sm rounded-lg" loading="lazy" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x200?text=Không+thể+tải+ảnh'; }} />
                        </div>
                    )}
                    <h3 className="text-[16px] md:text-lg font-medium text-slate-800 mb-4 flex gap-2 flex-wrap">
                        <span className="text-blue-600 font-bold">Câu {index+1}:</span>
                        <span dangerouslySetInnerHTML={{__html: q.q.replace(/【(.*?)】/g, '<u class="font-bold text-blue-700 decoration-2 underline-offset-4">$1</u>')}} />
                    </h3>

                    {isNumericOptions ? (
                        <div className="grid gap-2.5" style={{ gridTemplateColumns: `repeat(${q.opts.length}, minmax(0, 80px))`, justifyContent: 'start' }}>
                            {q.opts.map((opt, i) => {
                                let btnClass = `px-4 py-3 rounded-xl border transition-all font-medium flex items-center justify-center h-12 w-20 `;
                                if (showResult) {
                                    if (q.ans === i) btnClass += "border-green-500 bg-green-100 text-green-800 font-bold";
                                    else if (selected === i && selected !== q.ans) btnClass += "border-red-400 bg-red-50 text-red-700";
                                    else btnClass += "border-slate-100 text-slate-400 bg-slate-50";
                                } else {
                                    btnClass += selected === i ? "border-blue-500 bg-blue-50 text-blue-800 ring-1 ring-blue-500" : "border-slate-200 text-slate-600 hover:border-blue-300";
                                }
                                return (
                                    <button key={i} disabled={showResult} onClick={() => handleSelectAnswer(q.id, i)} className={btnClass}>
                                        <span className="text-lg font-bold">{i+1}</span>
                                    </button>
                                );
                            })}
                        </div>
                    ) : (
                        <div className="grid gap-2.5 grid-cols-1">
                            {q.opts.map((opt, i) => {
                                let btnClass = `px-4 py-3 rounded-xl border transition-all font-medium flex items-center gap-3 text-left `;
                                if (showResult) {
                                    if (q.ans === i) btnClass += "border-green-500 bg-green-100 text-green-800 font-bold";
                                    else if (selected === i && selected !== q.ans) btnClass += "border-red-400 bg-red-50 text-red-700";
                                    else btnClass += "border-slate-100 text-slate-400 bg-slate-50";
                                } else {
                                    btnClass += selected === i ? "border-blue-500 bg-blue-50 text-blue-800 ring-1 ring-blue-500" : "border-slate-200 text-slate-600 hover:border-blue-300";
                                }
                                return (
                                    <button key={i} disabled={showResult} onClick={() => handleSelectAnswer(q.id, i)} className={btnClass}>
                                        <span className={`w-7 h-7 rounded-full border text-sm flex items-center justify-center flex-shrink-0 ${showResult && q.ans===i ? 'border-green-600 bg-green-500 text-white' : (showResult && selected===i && selected!==q.ans ? 'border-red-500 bg-red-400 text-white' : (selected===i ? 'border-blue-500 bg-blue-500 text-white' : 'border-slate-300'))}`}>{i+1}</span>
                                        <span className="text-[15px]">{opt}</span>
                                    </button>
                                );
                            })}
                        </div>
                    )}

                    {showResult && (
                        <div className={`mt-4 p-3 rounded-lg flex items-center gap-3 border ${isCorrect ? 'border-green-200 bg-green-50 text-green-700' : 'border-red-200 bg-red-50 text-red-700'}`}>
                            <i className={`fa-solid ${isCorrect ? 'fa-circle-check text-green-500' : 'fa-circle-xmark text-red-500'} text-xl`}></i>
                            <span className="text-sm">{isCorrect ? 'Đúng rồi!' : `Đáp án đúng: ${q.ans+1}${!isNumericOptions ? ` (${q.opts[q.ans]})` : ''}`}</span>
                        </div>
                    )}
                </div>
            );
        };

        const HomeScreen = () => (
            <div className="min-h-screen bg-sky-50 flex items-center justify-center p-4">
                <div className="bg-white p-6 md:p-10 rounded-2xl shadow-xl max-w-md w-full text-center border-t-4 border-blue-500">
                    <i className="fa-solid fa-book-open text-blue-500 text-5xl mb-4"></i>
                    <h1 className="text-3xl font-extrabold text-slate-800">JLPT N4</h1>
                    <h2 className="text-xl font-bold text-blue-600 mb-6">Đề thi tháng 12/2021</h2>
                    <div className="text-left bg-slate-50 p-4 rounded-xl mb-8 text-sm text-slate-600 space-y-2">
                        <p><i className="fa-solid fa-hourglass-half text-orange-500 w-5"></i> 85 câu trắc nghiệm</p>
                        <p><i className="fa-solid fa-image text-purple-500 w-5"></i> Câu có ảnh chỉ hiển thị số</p>
                        <p><i className="fa-solid fa-headphones text-green-500 w-5"></i> File nghe (mở tab mới)</p>
                    </div>
                    <button onClick={() => { setCurrentScreen('exam'); changeSection('vocab'); window.scrollTo(0,0); }} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-xl w-full transition-all shadow-md">Bắt Đầu Thi</button>
                </div>
            </div>
        );

        const ExamScreen = () => (
            <div className="bg-slate-50 min-h-screen pb-24">
                <header className="sticky top-0 z-50 bg-blue-600 text-white shadow-md">
                    <div className="flex justify-between items-center p-4 max-w-3xl mx-auto">
                        <h1 className="font-bold text-lg">JLPT N4 12/2021</h1>
                        <div className="flex items-center bg-blue-800/50 px-3 py-1.5 rounded-full text-sm font-bold"><i className="fa-solid fa-clock text-yellow-300 mr-2"></i>{formatTime(timeLeft)}</div>
                    </div>
                    <div className="bg-white text-slate-600 border-b overflow-x-auto whitespace-nowrap scrollbar-hide flex">
                        {SECTIONS.map(sec => {
                            const total = examData[sec.id].length;
                            const answered = examData[sec.id].filter(q => answers[q.id]!==undefined).length;
                            return (
                                <button key={sec.id} onClick={() => { changeSection(sec.id); window.scrollTo(0,0); }} className={`px-5 py-3 text-sm font-bold border-b-2 transition-all flex items-center gap-2 ${activeSection===sec.id ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent'}`}>
                                    <i className={sec.icon}></i> {sec.title} <span className={`text-[11px] px-1.5 py-0.5 rounded-full ${answered===total ? 'bg-green-100 text-green-700' : 'bg-slate-100'}`}>{answered}/{total}</span>
                                </button>
                            );
                        })}
                    </div>
                </header>
                <main className="max-w-3xl mx-auto p-4 pt-6">
                    {activeSection === 'listening' && (
                        <div className="bg-slate-800 text-white p-3 rounded-xl mb-6 flex items-center justify-between">
                            <span><i className="fa-solid fa-headphones text-sky-400 mr-2"></i>File nghe</span>
                            <a href="https://drive.google.com/file/d/1x7iQZrIEbfD-0NrypsgOk-0PPuF0oe05/view?usp=sharing" target="_blank" className="bg-sky-500 hover:bg-sky-600 text-xs font-bold py-2 px-4 rounded-lg flex items-center gap-2"><i className="fa-solid fa-play"></i> Mở file nghe</a>
                        </div>
                    )}
                    {examData[activeSection].map((q, idx) => <QuestionCard key={q.id} q={q} index={idx} showResult={false} />)}
                    <div className="mt-8 pt-4 border-t"><button onClick={handleSubmit} className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 text-lg"><i className="fa-solid fa-check-circle"></i> Nộp bài thi</button></div>
                </main>
            </div>
        );

        const ResultsScreen = () => {
            const { totalCorrect, totalQuestions, percentage, sections } = calculateScore();
            const passed = percentage >= 60;
            return (
                <div className="min-h-screen bg-slate-50 p-4 pb-20">
                    <div className="max-w-3xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-md overflow-hidden mb-8 border">
                            <div className={`p-6 text-center text-white ${passed ? 'bg-green-500' : 'bg-orange-500'}`}>
                                <h1 className="text-2xl font-bold">{passed ? 'Chúc mừng!' : 'Cố gắng hơn nhé!'}</h1>
                                <p>Kết quả thi JLPT N4 12/2021</p>
                            </div>
                            <div className="p-6 flex flex-col items-center">
                                <div className="text-center mb-6"><span className="text-5xl font-black">{totalCorrect}</span><span className="text-2xl text-slate-400">/{totalQuestions}</span></div>
                                {SECTIONS.map(sec => <div key={sec.id} className="w-full bg-slate-50 p-3 rounded-lg flex justify-between items-center mb-2"><span><i className={sec.icon}></i> {sec.title}</span><span>{sections[sec.id].correct}/{sections[sec.id].total}</span></div>)}
                                <button onClick={() => { setAnswers({}); setCurrentScreen('home'); setActiveSection('vocab'); setTimeLeft(SECTIONS[0].time); }} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl mt-4">Làm lại đề</button>
                            </div>
                        </div>
                        <h2 className="text-lg font-bold mb-4">Chi tiết đáp án</h2>
                        {SECTIONS.map(sec => (
                            <div key={sec.id}>
                                <h3 className="text-md font-bold bg-slate-200 p-2 rounded text-center my-4">{sec.title}</h3>
                                {examData[sec.id].map((q, idx) => <QuestionCard key={q.id} q={q} index={idx} showResult={true} />)}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        return (
            <div>
                {currentScreen === 'home' && <HomeScreen />}
                {currentScreen === 'exam' && <ExamScreen />}
                {currentScreen === 'results' && <ResultsScreen />}
                <Modal isOpen={modalConfig.isOpen} title={modalConfig.title} message={modalConfig.message} onConfirm={modalConfig.onConfirm} onCancel={modalConfig.onCancel} />
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
