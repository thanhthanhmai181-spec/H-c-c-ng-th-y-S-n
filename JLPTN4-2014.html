            { id: 'c16', question: '問題３ - 1番', image: '1vUZ8RJaTRAuiYnGOLaQxyw1eAxLgqEsr', options: ['1', '2', '3'], correct: 1 },
            { id: 'c17', question: '問題３ - 2番', image: '1IcMxjeglCC7APw6y1QgpPRh0vApHJ4IL', options: ['1', '2', '3'], correct: 1 },
            { id: 'c18', question: '問題３ - 3番', image: '1EN2Pm1SAVTCgGxApSMoOfTLTwQgCqiqj', options: ['1', '2', '3'], correct: 0 },
            { id: 'c19', question: '問題３ - 4番', image: '1Vf9fF8iHHEwqdUhi_eLpFY2PCg0_Xi3R', options: ['1', '2', '3'], correct: 2 },
            { id: 'c20', question: '問題３ - 5番', image: '1BJ1-Ynuj_Y7QLz48S4C7SKTnW50MX9IM', options: ['1', '2', '3'], correct: 1 },
            { id: 'c21', question: '問題４ - 1番', options: ['1', '2', '3'], correct: 2 },
            { id: 'c22', question: '問題４ - 2番', options: ['1', '2', '3'], correct: 2 },
            { id: 'c23', question: '問題４ - 3番', options: ['1', '2', '3'], correct: 1 },
            { id: 'c24', question: '問題４ - 4番', options: ['1', '2', '3'], correct: 2 },
            { id: 'c25', question: '問題４ - 5番', options: ['1', '2', '3'], correct: 0 },
            { id: 'c26', question: '問題４ - 6番', options: ['1', '2', '3'], correct: 0 },
            { id: 'c27', question: '問題４ - 7番', options: ['1', '2', '3'], correct: 1 },
            { id: 'c28', question: '問題４ - 8番', options: ['1', '2', '3'], correct: 0 }
          ]
        };

        // --- STATE ---
        const TOTAL_TIME = 105 * 60;
        let appState = 'home';
        let currentSection = 'moji';
        let answers = {};
        let timeLeft = TOTAL_TIME;
        let scores = { moji: 0, bunpou: 0, dokkai: 0, choukai: 0, total: 0 };
        let timerInterval = null;
        const totalQuestionsCount = examData.moji.length + examData.bunpou.length + examData.dokkai.length + examData.choukai.length;

        // --- UTILS ---
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        function getSectionTitle(id) {
            switch(id) {
                case 'moji': return '文字・語彙 (Từ vựng)';
                case 'bunpou': return '文法 (Ngữ pháp)';
                case 'dokkai': return '読解 (Đọc hiểu)';
                case 'choukai': return '聴解 (Nghe hiểu)';
                default: return '';
            }
        }

        // --- APP LOGIC ---
        function startExam() {
            appState = 'testing';
            timeLeft = TOTAL_TIME;
            answers = {};
            currentSection = 'moji';
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam(true);
                }
            }, 1000);
            renderView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function submitExam(force = false) {
            if (force || window.confirm('Em có chắc chắn muốn nộp bài không? Nhớ kiểm tra lại các câu chưa làm nhé!')) {
                calculateScore();
                appState = 'result';
                if(timerInterval) clearInterval(timerInterval);
                const audio = document.getElementById('exam-audio');
                if(audio) audio.pause();
                renderView();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function reviewExam() {
            appState = 'review';
            currentSection = 'moji';
            renderView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToResult() {
            appState = 'result';
            renderView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeSection(secId) {
            currentSection = secId;
            document.getElementById('tabs-container').innerHTML = getTabsHTML();
            document.getElementById('questions-container').innerHTML = getQuestionsHTML();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectAnswer(qId, optionIdx) {
            if (appState !== 'testing') return;
            answers[qId] = optionIdx;
            const questionDiv = document.getElementById(`q-${qId}`);
            if(questionDiv) {
                const labels = questionDiv.querySelectorAll('label');
                labels.forEach((label, idx) => {
                    const input = label.querySelector('input');
                    if(idx === optionIdx) {
                        label.className = "flex items-center p-3 border rounded-lg cursor-pointer transition-all bg-blue-50 border-blue-500 shadow-sm";
                        input.checked = true;
                    } else {
                        label.className = "flex items-center p-3 border rounded-lg cursor-pointer transition-all bg-white border-gray-200 hover:border-blue-300 hover:bg-gray-50";
                        input.checked = false;
                    }
                });
            }
            updateProgress();
        }

        function calculateScore() {
            let newScores = { moji: 0, bunpou: 0, dokkai: 0, choukai: 0, total: 0 };
            let totalQuestions = 0;
            let correctAnswers = 0;
            Object.keys(examData).forEach(section => {
                let sectionCorrect = 0;
                examData[section].forEach(q => {
                    totalQuestions++;
                    if (answers[q.id] === q.correct) {
                        sectionCorrect++;
                        correctAnswers++;
                    }
                });
                newScores[section] = Math.round((sectionCorrect / examData[section].length) * 100);
            });
            newScores.total = Math.round((correctAnswers / totalQuestions) * 100);
            scores = newScores;
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer-display');
            if (timerEl) {
                timerEl.innerHTML = `⏳ ${formatTime(timeLeft)}`;
                if(timeLeft < 300) {
                    timerEl.className = 'text-base md:text-lg font-mono font-bold px-2 py-1 rounded flex items-center gap-1 bg-red-100 text-red-600 animate-pulse';
                }
            }
        }

        function updateProgress() {
            if(appState !== 'testing') return;
            const answeredCount = Object.keys(answers).length;
            const progressPercent = Math.round((answeredCount / totalQuestionsCount) * 100);
            const barFill = document.getElementById('progress-bar-fill');
            if(barFill) barFill.style.width = `${progressPercent}%`;
            const progressText = document.getElementById('progress-text');
            if(progressText) progressText.innerHTML = `<span class="text-blue-600">${answeredCount}/${totalQuestionsCount}</span>`;
        }

        // --- RENDER ---
        function renderView() {
            const headerTitle = document.getElementById('header-title');
            const headerInner = document.getElementById('header-inner');
            const headerRight = document.getElementById('header-right');
            const progressContainer = document.getElementById('progress-container');
            const mainContainer = document.getElementById('main-container');
            const footerContainer = document.getElementById('footer-container');

            // Điều chỉnh header theo trạng thái
            if (appState === 'testing') {
                // Gọn: chỉ giữ tên ngắn và đồng hồ, giảm padding
                headerTitle.innerHTML = `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">JLPT N4</span>`;
                headerInner.className = "max-w-5xl mx-auto px-4 py-1.5 flex justify-between items-center";
                headerRight.innerHTML = `<div id="timer-display" class="text-base md:text-lg font-mono font-bold px-2 py-1 rounded flex items-center gap-1 bg-blue-50 text-blue-700">⏳ ${formatTime(timeLeft)}</div>`;
                progressContainer.classList.remove('hidden');
            } else if (appState === 'review') {
                headerTitle.innerHTML = `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm md:text-base">JLPT N4</span>
                    <span class="hidden sm:inline text-gray-600 font-medium text-base">Đề thi tháng 7/2014</span>`;
                headerInner.className = "max-w-5xl mx-auto px-4 py-2 flex justify-between items-center";
                headerRight.innerHTML = `<button onclick="backToResult()" class="text-blue-600 font-medium hover:underline text-sm">← Quay lại Kết quả</button>`;
                progressContainer.classList.add('hidden');
            } else {
                // Home hoặc result
                headerTitle.innerHTML = `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm md:text-base">JLPT N4</span>
                    <span class="hidden sm:inline text-gray-600 font-medium text-base">Đề thi tháng 7/2014</span>`;
                headerInner.className = "max-w-5xl mx-auto px-4 py-2 flex justify-between items-center";
                headerRight.innerHTML = '';
                progressContainer.classList.add('hidden');
            }

            // Nội dung chính
            if (appState === 'home') {
                mainContainer.innerHTML = getHomeHTML();
                footerContainer.innerHTML = '';
            } else if (appState === 'result') {
                mainContainer.innerHTML = getResultHTML();
                footerContainer.innerHTML = '';
            } else if (appState === 'testing' || appState === 'review') {
                mainContainer.innerHTML = `
                    <div class="relative">
                        <div id="tabs-container">${getTabsHTML()}</div>
                        <div id="questions-container" class="space-y-6 pb-24">${getQuestionsHTML()}</div>
                    </div>
                `;
                if (appState === 'testing') {
                    footerContainer.innerHTML = getFooterHTML();
                    updateProgress();
                } else {
                    footerContainer.innerHTML = '';
                }
            }
        }

        function getHomeHTML() {
            return `
                <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm text-center max-w-2xl mx-auto mt-4 md:mt-10 border border-gray-100">
                    <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">🌸</div>
                    <h2 class="text-2xl md:text-3xl font-bold mb-4 text-gray-800">Kỳ thi thử JLPT N4</h2>
                    <p class="text-gray-600 mb-8 leading-relaxed text-sm md:text-base">
                        Sensei chào các em! Đây là bài thi thử sát với đề JLPT thật tháng 7 năm 2014.<br class="hidden md:block"/>
                        Đề thi có đầy đủ các phần: <strong class="text-blue-600">Từ vựng, Ngữ pháp, Đọc hiểu và Nghe hiểu</strong>.<br/>
                        Hãy làm bài thật cẩn thận trong thời gian 105 phút nhé! 頑張ってください！
                    </p>
                    <div class="grid grid-cols-2 gap-4 mb-8 text-left max-w-sm mx-auto">
                        <div class="bg-slate-50 p-3 rounded text-sm"><span class="text-gray-500">Số câu hỏi:</span> <br/><strong class="text-lg text-gray-800">${totalQuestionsCount} câu</strong></div>
                        <div class="bg-slate-50 p-3 rounded text-sm"><span class="text-gray-500">Thời gian:</span> <br/><strong class="text-lg text-gray-800">105 phút</strong></div>
                    </div>
                    <button onclick="startExam()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-10 rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95">
                        Bắt đầu làm bài
                    </button>
                </div>
            `;
        }

        function getResultHTML() {
            const isGood = scores.total >= 60;
            const message = isGood ? 'Tuyệt vời quá! Sensei chúc mừng em đã hoàn thành rất tốt bài thi!' : 'Đừng buồn nhé! Hãy xem lại những câu sai và cố gắng hơn ở lần sau. Sensei tin em làm được!';
            const scoreColor = isGood ? 'text-green-500' : 'text-orange-500';
            let html = `
                <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm text-center mb-8 border-t-8 border-green-500 max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold mb-2 text-gray-800">Kết quả bài thi của em</h2>
                    <div class="flex justify-center items-baseline gap-2 mb-2">
                        <span class="text-6xl font-extrabold ${scoreColor}">${scores.total}</span>
                        <span class="text-xl text-gray-500">/ 100</span>
                    </div>
                    <p class="text-gray-600 mb-8 text-lg">${message}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            `;
            ['moji', 'bunpou', 'dokkai', 'choukai'].forEach(sec => {
                const secScore = scores[sec];
                const secColor = secScore < 50 ? 'text-red-500' : 'text-gray-800';
                html += `
                        <div class="bg-slate-50 p-4 rounded-xl border border-gray-100">
                            <div class="text-sm text-gray-500 mb-1">${getSectionTitle(sec).split(' ')[0]}</div>
                            <div class="text-2xl font-bold ${secColor}">${secScore}%</div>
                        </div>
                `;
            });
            html += `
                    </div>
                    <div class="flex flex-col sm:flex-row justify-center gap-4">
                        <button onclick="reviewExam()" class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-semibold py-3 px-8 rounded-xl transition-colors">Xem lại Đáp án</button>
                        <button onclick="startExam()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-3 px-8 rounded-xl transition-colors">Làm lại từ đầu</button>
                    </div>
                </div>
            `;
            return html;
        }

        function getTabsHTML() {
            let html = `<div class="flex overflow-x-auto whitespace-nowrap gap-2 mb-6 border-b pb-2 scrollbar-hide">`;
            Object.keys(examData).forEach(sec => {
                const isActive = currentSection === sec;
                const baseClass = "px-4 py-2 rounded-t-lg font-medium transition-all flex-shrink-0 cursor-pointer ";
                const activeClass = isActive ? "bg-blue-600 text-white shadow-md" : "bg-gray-100 text-gray-600 hover:bg-gray-200";
                html += `<button onclick="changeSection('${sec}')" class="${baseClass} ${activeClass}">${getSectionTitle(sec)}</button>`;
            });
            html += `</div>`;
            return html;
        }

        function getQuestionsHTML() {
            const questions = examData[currentSection];
            const isReview = appState === 'review';
            let html = '';

            // Phần Nghe: thay iframe bằng nút mở tab mới
            if (currentSection === 'choukai') {
                // Link Google Drive dạng view, mở trực tiếp trong tab mới
                const audioLink = "https://drive.google.com/file/d/1NxBXUxyq3ekQmkAvWk9toqLigqA37Zdg/view";
                html += `
                    <div class="bg-yellow-50 border-l-4 border-yellow-500 p-4 mb-6 rounded shadow-sm">
                        <h3 class="font-bold text-yellow-800 mb-3 flex items-center gap-2">
                            <span>🎧</span> Phần Nghe (聴解)
                        </h3>
                        <a href="${audioLink}" target="_blank" rel="noopener noreferrer"
                           class="inline-flex items-center gap-2 bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-xl shadow transition-transform hover:scale-105 active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                            </svg>
                            Mở file nghe (tab mới)
                        </a>
                        <p class="text-xs text-yellow-700 mt-2">Bấm vào nút trên để mở audio trong tab mới, sau đó quay lại đây làm bài.</p>
                    </div>
                `;
            }

            questions.forEach((q, index) => {
                html += `
                    <div id="q-${q.id}" class="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow mb-6">
                        <div class="flex flex-col md:flex-row gap-3 mb-4">
                            <span class="font-bold text-blue-600 text-lg min-w-[60px]">Câu ${index + 1}:</span>
                            <div class="flex-1">
                `;
                if (q.text) {
                    html += `<div class="bg-gray-50 p-4 rounded-lg mb-4 whitespace-pre-wrap font-serif text-gray-800 border-l-4 border-gray-300 text-sm md:text-base leading-relaxed">${q.text}</div>`;
                }
                if (q.image) {
                    html += `
                        <div class="mb-4 text-center">
                            <img src="https://drive.google.com/thumbnail?id=${q.image}&sz=w800" alt="Hình ảnh câu hỏi" class="max-w-full h-auto rounded shadow-sm inline-block max-h-[250px] object-contain border border-gray-200" onerror="this.onerror=null; this.src='https://placehold.co/600x200/eeeeee/999999?text=Loi+tai+anh';"/>
                        </div>
                    `;
                }
                html += `<p class="text-base md:text-lg text-gray-800 whitespace-pre-wrap font-medium">${q.question}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 gap-3 ml-0 md:ml-[72px] ${q.options.length <= 4 ? 'md:grid-cols-2' : ''}">
                `;
                q.options.forEach((opt, optIdx) => {
                    const isSelected = answers[q.id] === optIdx;
                    const isCorrect = q.correct === optIdx;
                    let labelClass = "flex items-center p-3 border rounded-lg cursor-pointer transition-all ";
                    if (isReview) {
                        if (isCorrect) labelClass += "bg-green-50 border-green-500 shadow-sm";
                        else if (isSelected && !isCorrect) labelClass += "bg-red-50 border-red-400";
                        else labelClass += "bg-white border-gray-200 opacity-60";
                    } else {
                        labelClass += isSelected ? "bg-blue-50 border-blue-500 shadow-sm" : "bg-white border-gray-200 hover:border-blue-300 hover:bg-gray-50";
                    }
                    const disabledAttr = isReview ? 'disabled' : '';
                    const checkedAttr = isSelected ? 'checked' : '';
                    html += `
                        <label class="${labelClass}">
                            <input type="radio" name="${q.id}" value="${optIdx}" ${checkedAttr} ${disabledAttr} onchange="selectAnswer('${q.id}', ${optIdx})" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500 mr-3 shrink-0" />
                            <span class="text-sm md:text-base ${isReview && isCorrect ? 'text-green-700 font-semibold' : 'text-gray-700'}">${opt}</span>
                            ${isReview && isCorrect ? '<span class="ml-auto text-green-500 text-xl">✓</span>' : ''}
                            ${isReview && isSelected && !isCorrect ? '<span class="ml-auto text-red-500 text-xl">✗</span>' : ''}
                        </label>
                    `;
                });
                html += `</div></div>`;
            });
            return html;
        }
