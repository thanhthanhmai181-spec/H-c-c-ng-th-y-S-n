        function parseText(text) {
          if (!text) return "";
          let html = text.replace(/\*(.*?)\*/g, "<span class='text-blue-600 dark:text-blue-400 font-bold'>$1</span>");
          html = html.replace(/\[(.*?)\]\((.*?)\)/g, "<ruby>$1<rt>$2</rt></ruby>");
          html = html.replace(/([\u4e00-\u9faf\u3400-\u4dbf]+)\[(.*?)\]/g, "<ruby>$1<rt>$2</rt></ruby>");
          html = html.replace(/([\u4e00-\u9faf\u3400-\u4dbf]+)\((.*?)\)/g, "<ruby>$1<rt>$2</rt></ruby>");
          return html;
        }

        function getPlainText(text) {
          if (!text) return "";
          let plain = text.replace(/\*(.*?)\*/g, "$1");
          plain = plain.replace(/\[(.*?)\]\((.*?)\)/g, "$1");
          plain = plain.replace(/([\u4e00-\u9faf\u3400-\u4dbf]+)\[(.*?)\]/g, "$1");
          plain = plain.replace(/([\u4e00-\u9faf\u3400-\u4dbf]+)\((.*?)\)/g, "$1");
          return plain;

        function useGrammarData() {

              return allData.map(d => ({
                id: d[0], l: d[1], p: d[2], m: d[3], s: d[4], u: d[5],
                ex: (d[6] || "").split('~').map(exStr => {
                  const parts = exStr.split('|');
                  return { t: parts[0] || "", v: parts[1] || "" };
                }),
                qz: (d[7] || "").split('~').map(qStr => {
                  const p = qStr.split('|');
                  if(p[0] === 'f') return { type: 'fill', q: p[1], o: p[2]?p[2].split(','):[], a: p[2]?p[2].split(',')[parseInt(p[3])]:"", e: p[4] };

                  return null;
                }).filter(Boolean)
              }));
            } catch (e) {
              console.error("Lỗi biên dịch dữ liệu:", e);
              return [];

                </div>
                <h2 className="text-2xl font-extrabold mb-2 text-gray-800 dark:text-gray-100 shrink-0">Hoàn thành phiên học!</h2>
                <p className="text-gray-500 mb-6 font-medium shrink-0">Bạn đã lật tổng cộng {sessionRemembered.length + sessionForgotten.length} thẻ.</p>
                
                <div className="flex gap-4 w-full max-w-sm mb-6 shrink-0">
                  <div className="flex-1 bg-white dark:bg-gray-800 border border-green-200 dark:border-green-900/50 p-4 rounded-2xl text-center shadow-sm">
                    <div className="text-3xl font-black text-green-500">{sessionRemembered.length}</div>
                    <div className="text-[10px] font-bold text-gray-400 uppercase">Đã nhớ</div>
                  </div>
                  <div className="flex-1 bg-white dark:bg-gray-800 border border-red-200 dark:border-red-900/50 p-4 rounded-2xl text-center shadow-sm">
                    <div className="text-3xl font-black text-red-500">{sessionForgotten.length}</div>
                    <div className="text-[10px] font-bold text-gray-400 uppercase">Chưa nhớ</div>
                  </div>
                </div>

                <div className="w-full max-w-sm space-y-6 flex-1">
                  {sessionForgotten.length > 0 && (
                    <div>
                      <h3 className="font-bold text-red-500 mb-2 flex items-center gap-2"><Icons.X size={18}/> Cần ôn tập lại</h3>
                      <div className="bg-white dark:bg-gray-800 rounded-2xl border border-red-100 dark:border-red-900/30 overflow-hidden divide-y divide-gray-100 dark:divide-gray-700">
                        {sessionForgotten.map(c => (
                          <div key={c.id} className="p-3">
                            <div className="font-bold font-japanese text-gray-700 dark:text-gray-300">{c.p.split('\n')[0]}</div>
                            <div className="text-xs text-gray-500 mt-1">{c.m}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {sessionRemembered.length > 0 && (
                    <div>
                      <h3 className="font-bold text-green-500 mb-2 flex items-center gap-2"><Icons.CheckCircle2 size={18}/> Đã thuộc</h3>
                      <div className="bg-white dark:bg-gray-800 rounded-2xl border border-green-100 dark:border-green-900/30 overflow-hidden divide-y divide-gray-100 dark:divide-gray-700">
                        {sessionRemembered.map(c => (
                          <div key={c.id} className="p-3">
                            <div className="font-bold font-japanese text-gray-700 dark:text-gray-300">{c.p.split('\n')[0]}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="w-full max-w-sm mt-8 space-y-3 shrink-0">
                  {sessionForgotten.length > 0 && (
                    <button onClick={() => startSession('unmastered', sessionForgotten)} className="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-md hover:bg-orange-600 active:scale-95 transition">
                      Ôn lại thẻ chưa nhớ ngay
                    </button>
                  )}
                  <button onClick={() => setView('dashboard')} className="w-full py-4 bg-gray-200 text-gray-700 dark:bg-gray-800 dark:text-gray-300 rounded-2xl font-bold shadow-md hover:bg-gray-300 dark:hover:bg-gray-700 active:scale-95 transition flex justify-center items-center gap-2">
                    <Icons.Home size={20}/> Về trung tâm Thẻ nhớ
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="h-full flex flex-col bg-gray-100 dark:bg-gray-950 pb-safe relative">
              <div className="px-4 py-4 flex justify-between items-center bg-white dark:bg-gray-900 shadow-sm z-10">
                <button onClick={() => setView('dashboard')} className="p-2 rounded-full text-gray-500 bg-gray-100 dark:bg-gray-800 active:scale-95"><Icons.ChevronLeft size={20}/></button>
                <div className="font-bold text-gray-500 dark:text-gray-400">Còn lại: <span className="text-blue-600 dark:text-blue-400">{queue.length}</span> thẻ</div>
                <button onClick={() => setView('result')} className="text-red-500 font-bold text-xs bg-red-50 dark:bg-red-900/30 px-3 py-2 rounded-lg active:scale-95 transition">Dừng</button>
              </div>

              <div className="flex-1 flex flex-col justify-center px-5 py-6 perspective-1000">
                <div onClick={() => !isFlipped && setIsFlipped(true)} className={`w-full min-h-[380px] flex flex-col items-center justify-center p-8 rounded-[2rem] shadow-lg transition-all duration-300 cursor-pointer overflow-hidden relative border-4 ${isFlipped ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800' : 'bg-white dark:bg-gray-800 border-white dark:border-gray-800 active:scale-[0.98]'}`}>
                  {!isFlipped ? (
                    <div className="text-center w-full animate-fadeIn flex flex-col h-full justify-center">
                      <div className="absolute top-6 left-0 right-0 text-center"><span className="text-xs font-black text-blue-500 dark:text-blue-400 uppercase tracking-[0.2em] bg-blue-100 dark:bg-blue-900/50 px-3 py-1.5 rounded-full">Ý nghĩa Tiếng Việt</span></div>
                      <h3 className="text-3xl md:text-4xl font-extrabold text-gray-800 dark:text-gray-100 leading-tight">{queue[0].m}</h3>
                      <div className="absolute bottom-6 left-0 right-0 text-center"><span className="text-sm font-medium text-gray-400 animate-pulse bg-gray-100 dark:bg-gray-800 px-4 py-2 rounded-full">👆 Bấm vào thẻ để lật</span></div>
                    </div>
                  ) : (
                    <div className="text-center w-full fade-in-up flex flex-col h-full justify-between pt-4">
                      <span className="text-xs font-black text-green-600 dark:text-green-400 uppercase tracking-[0.2em]">Ngữ pháp Tiếng Nhật</span>
                      <h3 className="text-3xl font-extrabold text-blue-600 dark:text-blue-400 font-japanese mt-6 mb-6 whitespace-pre-line leading-tight">{queue[0].p.split('\n')[0]}</h3>
                      <div className="text-left bg-white dark:bg-gray-900 p-5 rounded-2xl border border-blue-100 dark:border-blue-800 w-full shadow-inner mt-auto">
                        <span className="text-[10px] font-black text-orange-500 uppercase tracking-widest block mb-2 opacity-80">Cách chia thể</span>
                        <p className="font-mono text-gray-700 dark:text-gray-300 text-sm whitespace-pre-line leading-relaxed">{queue[0].s}</p>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              <div className="px-5 pb-6 grid grid-cols-2 gap-4 shrink-0">
                <button disabled={!isFlipped} onClick={(e) => handleAnswer(false, e)} className={`py-4 md:py-5 rounded-2xl font-black text-lg flex flex-col items-center justify-center gap-1 transition-all shadow-md active:scale-95 ${isFlipped ? 'bg-red-500 text-white hover:bg-red-600 border-b-4 border-red-700' : 'bg-gray-200 dark:bg-gray-800 text-gray-400 opacity-50 cursor-not-allowed'}`}>
                  <Icons.X size={28} className="mb-1" /> CHƯA NHỚ
                </button>
                <button disabled={!isFlipped} onClick={(e) => handleAnswer(true, e)} className={`py-4 md:py-5 rounded-2xl font-black text-lg flex flex-col items-center justify-center gap-1 transition-all shadow-md active:scale-95 ${isFlipped ? 'bg-green-500 text-white hover:bg-green-600 border-b-4 border-green-700' : 'bg-gray-200 dark:bg-gray-800 text-gray-400 opacity-50 cursor-not-allowed'}`}>
                  <Icons.CheckCircle2 size={28} className="mb-1" /> ĐÃ NHỚ
                </button>
              </div>
            </div>
          );
        }

        function PracticeTab({ data }) {
          const [sessionState, setSessionState] = useState('list');
          const [selectedGrammar, setSelectedGrammar] = useState(null);
          const [quizQuestions, setQuizQuestions] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [score, setScore] = useState(0);
          const [showAnswer, setShowAnswer] = useState(false);
          const [selectedOption, setSelectedOption] = useState(null);
          const [arrangedParts, setArrangedParts] = useState([]);

          const startSession = (grammar) => {
            setSelectedGrammar(grammar);
            const questions = [...grammar.qz].sort(() => Math.random() - 0.5);
            setQuizQuestions(questions); setCurrentIndex(0); setScore(0); setSessionState('playing'); resetQuestionState();
          };

          const resetQuestionState = () => { setShowAnswer(false); setSelectedOption(null); setArrangedParts([]); };
          const checkAnswer = (isCorrect) => { if (isCorrect) setScore(prev => prev + 1); setShowAnswer(true); };
          const nextQuestion = () => { if (currentIndex + 1 < quizQuestions.length) { setCurrentIndex(prev => prev + 1); resetQuestionState(); } else setSessionState('result'); };

          if (sessionState === 'list') {
            return (
              <div className="p-4 animate-fadeIn">
                <h2 className="text-2xl font-bold mb-2 ml-2">Luyện tập Trắc nghiệm</h2>
                <p className="text-gray-500 mb-6 ml-2 text-sm">Kiểm tra chia thể và sắp xếp câu chuẩn JLPT.</p>
                <div className="grid gap-3">
                  {data.map(g => (
                    <button key={g.id} onClick={() => startSession(g)} className="bg-white dark:bg-gray-800 p-5 rounded-3xl border border-gray-100 dark:border-gray-700 shadow-sm flex items-center justify-between hover:border-blue-500 transition-colors text-left group">
                      <div>
                        <div className="font-bold text-lg font-japanese mb-1 group-hover:text-blue-500 transition-colors whitespace-pre-line">{g.p.split('\n')[0]}</div>
                        <div className="text-sm text-gray-500">{g.m}</div>
                      </div>
                      <div className="w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-500 flex items-center justify-center shrink-0"><Icons.PlayCircle/></div>
                    </button>
                  ))}
                </div>
              </div>
            );
          }

          if (sessionState === 'result') {
            const percent = Math.round((score / (quizQuestions.length || 1)) * 100);
            return (
              <div className="p-8 h-[80vh] flex flex-col items-center justify-center text-center animate-fadeIn">
                <div className={percent >= 80 ? 'text-yellow-500 mb-6' : 'text-blue-500 mb-6'}><Icons.Trophy size={80}/></div>
                <h2 className="text-3xl font-bold mb-2">Hoàn thành!</h2>
                <p className="text-gray-500 mb-8">{percent >= 80 ? "Tuyệt vời!" : "Cố gắng thêm nhé!"}</p>
                <div className="text-6xl font-extrabold mb-10 text-blue-600 dark:text-blue-400">{score} / {quizQuestions.length}</div>
                <div className="w-full space-y-3">
                  <button onClick={() => setSessionState('list')} className="w-full py-4 bg-gray-200 dark:bg-gray-800 rounded-2xl font-bold text-gray-700 dark:text-gray-300">Quay lại danh sách</button>
                </div>
              </div>
            );
          }

          const currentQ = quizQuestions[currentIndex];
          if(!currentQ) return null;
          const progressPercent = ((currentIndex) / quizQuestions.length) * 100;

          return (
            <div className="h-full flex flex-col animate-fadeIn bg-gray-50 dark:bg-[#0B1121]">
              <div className="bg-white dark:bg-gray-900 px-4 pt-4 pb-2 border-b dark:border-gray-800">
                <div className="flex justify-between items-center mb-3">
                  <button onClick={() => setSessionState('list')} className="p-2 -ml-2 text-gray-400 hover:text-gray-600"><Icons.X/></button>
                  <div className="font-bold text-sm text-gray-500">Câu {currentIndex + 1} / {quizQuestions.length}</div>
                  <div className="w-8"></div>
                </div>
                <div className="w-full bg-gray-200 dark:bg-gray-800 rounded-full h-1.5 mb-2"><div className="bg-blue-500 h-1.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div></div>
                <div className="text-center font-bold text-blue-600 dark:text-blue-400 font-japanese text-sm">{selectedGrammar.l}: {selectedGrammar.p.split('\n')[0]}</div>
              </div>

              <div className="flex-1 p-4 md:p-6 overflow-y-auto flex flex-col">
                {currentQ.type === 'fill' ? (
                  <div className="flex-1 flex flex-col">
                    <span className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Chia thể / Chọn từ đúng</span>
                    <h3 className="text-2xl font-japanese text-gray-800 dark:text-gray-200 mb-8 leading-relaxed bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700" dangerouslySetInnerHTML={{ __html: parseText(currentQ.q.replace('___', ' ( ... ) ')) }}></h3>
                    <div className="space-y-3 mt-auto mb-6">
                      {currentQ.o.map((opt, idx) => {
                        let btnStyle = "w-full p-4 rounded-2xl font-japanese text-lg transition-all border-2 ";
                        if (!showAnswer) btnStyle += "bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 shadow-sm hover:border-blue-400";
                        else if (opt === currentQ.a) btnStyle += "bg-green-100 border-green-500 text-green-700 dark:bg-green-900/30";
                        else if (opt === selectedOption) btnStyle += "bg-red-100 border-red-500 text-red-700 dark:bg-red-900/30";
                        else btnStyle += "opacity-40 border-transparent bg-gray-50 dark:bg-gray-900";
                        return <button key={idx} disabled={showAnswer} onClick={() => { setSelectedOption(opt); checkAnswer(opt === currentQ.a); }} className={btnStyle}>{opt}</button>;
                      })}
                    </div>
                  </div>
                ) : (
                    <div className="flex-1 flex flex-col">
                    <span className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Sắp xếp thành câu đúng</span>
                    <h3 className="text-xl font-japanese text-gray-800 dark:text-gray-200 mb-6 bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 text-center tracking-wider" dangerouslySetInnerHTML={{ __html: parseText(currentQ.q) }}></h3>
                    <div className="flex flex-wrap gap-2 mb-8 min-h-[70px] p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border-2 border-dashed border-blue-200 dark:border-blue-800 justify-center items-center">
                      {arrangedParts.length === 0 && <span className="text-sm text-blue-300">Bấm vào các từ bên dưới</span>}
                      {arrangedParts.map((partIdx, idx) => <button key={idx} disabled={showAnswer} onClick={() => setArrangedParts(prev => prev.filter(p => p !== partIdx))} className="px-4 py-2.5 bg-blue-500 text-white rounded-xl shadow-sm font-japanese text-lg active:scale-95 transition">{currentQ.p[partIdx]}</button>)}
                    </div>
                    <div className="flex flex-wrap gap-3 mb-8 justify-center">
                      {currentQ.p.map((word, idx) => {
                        if (arrangedParts.includes(idx)) return null;
                        return <button key={idx} disabled={showAnswer} onClick={() => setArrangedParts(prev => [...prev, idx])} className="px-5 py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl font-japanese bg-white dark:bg-gray-800 text-lg active:scale-95 transition">{word}</button>;
                      })}
                    </div>
                    <div className="mt-auto">
                      {!showAnswer && arrangedParts.length === currentQ.p.length && <button onClick={() => checkAnswer(JSON.stringify(arrangedParts) === JSON.stringify(currentQ.ao))} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold animate-fadeIn shadow-lg active:scale-95 transition">Kiểm tra đáp án</button>}
                    </div>
                  </div>
                )}

                {showAnswer && (
                  <div className="animate-slideIn bg-white dark:bg-gray-800 p-5 rounded-3xl border border-gray-100 dark:border-gray-700 shadow-lg mt-auto">
                    {(() => {
                      const isCorrect = currentQ.type === 'fill' ? selectedOption === currentQ.a : JSON.stringify(arrangedParts) === JSON.stringify(currentQ.ao);
                      return isCorrect ? (
                        <div className="text-green-600 dark:text-green-400 font-bold flex items-center gap-2 mb-4"><Icons.CheckCircle2/> Chính xác! 🎉</div>
                      ) : (
                        <div className="text-red-600 dark:text-red-400 font-bold mb-4">
                          <div className="flex items-center gap-2 mb-2"><Icons.X/> Sai mất rồi. Đáp án đúng là:</div>
                          <div className="font-japanese text-gray-800 dark:text-gray-200 bg-red-50 dark:bg-red-900/20 p-3 rounded-xl border border-red-100 dark:border-red-900/50">
                            {currentQ.type === 'fill' ? currentQ.a : currentQ.ao.map(i => currentQ.p[i]).join(" ")}
                          </div>
                        </div>
                      );
                    })()}
                    <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-2xl border border-blue-100 dark:border-blue-900/50 mb-4"><div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 font-bold text-sm mb-1"><Icons.Info/> Giải thích:</div><p className="text-gray-700 dark:text-gray-300 text-sm leading-relaxed">{currentQ.e}</p></div>
                    <button onClick={nextQuestion} className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition active:scale-95 shadow-md">{currentIndex + 1 === quizQuestions.length ? 'Xem kết quả' : 'Câu tiếp theo'}</button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function JLPTApp() {
          const [activeTab, setActiveTab] = useState('home'); 
          const [selectedGrammarId, setSelectedGrammarId] = useState(null); 
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          // ĐỒNG BỘ REACT STATE VỚI LOCAL STORAGE ĐỂ CLOUD CLONE ĐƯỢC DỮ LIỆU CHÍNH XÁC
          const [masteredIds, setMasteredIds] = useState(() => {
            const saved = localStorage.getItem('sk_n4_mastered_ids');
            return saved ? new Set(JSON.parse(saved)) : new Set();
          });

          useEffect(() => {
            localStorage.setItem('sk_n4_mastered_ids', JSON.stringify([...masteredIds]));
          }, [masteredIds]);

          useEffect(() => {
            if (isDarkMode) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
          }, [isDarkMode]);

          const speakText = (text) => {
            if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const cleanText = getPlainText(text);
              const u = new SpeechSynthesisUtterance(cleanText); 
              u.lang = 'ja-JP'; 
              u.rate = 0.85; 
              window.speechSynthesis.speak(u);
            }
          };

          const parsedGData = useGrammarData();

          const learnedCount = masteredIds.size;
          const totalCount = parsedGData.length;
          const progressPercent = Math.round((learnedCount / (totalCount || 1)) * 100) || 0;

          const renderContent = () => {
            if (selectedGrammarId !== null) {
              const g = parsedGData.find(item => item.id === selectedGrammarId);
              return <DetailView g={g} onBack={() => setSelectedGrammarId(null)} isDarkMode={isDarkMode} speakText={speakText} markAsLearned={() => setMasteredIds(prev => new Set(prev).add(g.id))} isLearned={masteredIds.has(g.id)} />;
            }
            switch (activeTab) {
              case 'home': return <HomeTab pPercent={progressPercent} lCount={learnedCount} tCount={totalCount} onStartPractice={() => setActiveTab('practice')} onStartLearn={() => setActiveTab('library')} />;
              case 'library': return <LibraryTab data={parsedGData} onSelect={setSelectedGrammarId} srsData={masteredIds} />;
              case 'flashcard': return <FlashcardTab data={parsedGData} masteredIds={masteredIds} setMasteredIds={setMasteredIds} setViewParent={setActiveTab} />;
              case 'practice': return <PracticeTab data={parsedGData} />;
              default: return null;
            }
          };

          return (
            <div className={`min-h-screen flex justify-center bg-gray-100 dark:bg-gray-950 font-sans transition-colors duration-300`}>
              <div className={`w-full max-w-md md:max-w-xl h-screen flex flex-col relative overflow-hidden shadow-2xl ${isDarkMode ? 'bg-gray-900 text-gray-100' : 'bg-white text-gray-800'}`}>
                {selectedGrammarId === null && (
                  <header className="flex justify-between items-center p-4 border-b dark:border-gray-800 bg-white dark:bg-gray-900 z-10">
                    <h1 className="text-xl font-bold text-blue-600 dark:text-blue-400">N4 Master</h1>
                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                      {isDarkMode ? <Icons.Sun/> : <Icons.Moon/>}
                    </button>
                  </header>
                )}
                
                <main className={`flex-1 overflow-y-auto custom-scrollbar pb-20`}>
                  {renderContent()}
                </main>

                {selectedGrammarId === null && (
                  <nav className="absolute bottom-0 w-full border-t border-gray-200 dark:border-gray-800 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md flex justify-around p-2 pb-safe z-20">
                    <NavButton icon={<Icons.Home />} label="Tổng quan" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                    <NavButton icon={<Icons.LayoutList />} label="Bài học" isActive={activeTab === 'library'} onClick={() => setActiveTab('library')} />
                    <NavButton icon={<Icons.Bookmark />} label="Flashcard" isActive={activeTab === 'flashcard'} onClick={() => setActiveTab('flashcard')} />
                    <NavButton icon={<Icons.BrainCircuit />} label="Luyện tập" isActive={activeTab === 'practice'} onClick={() => setActiveTab('practice')} />
                  </nav>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<JLPTApp />);
    </script>
</body>
</html>
