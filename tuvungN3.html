            const [score, setScore] = useState(0);
            const [options, setOptions] = useState([]);
            const [selectedAnswer, setSelectedAnswer] = useState(null);

            const startQuiz = (mode) => {
                let words = mode === 'learning' ? N3_VOCABULARY.filter(w => wordStatus[w.id] === 'learning') : N3_VOCABULARY.filter(w => w.lesson === mode);
                if (words.length === 0) return alert(mode === 'learning' ? "Bạn không có từ nào 'Chưa nhớ'." : "Bài này chưa có từ vựng.");
                setQuizWords(words.sort(() => 0.5 - Math.random())); 
                setQuestionIndex(0); 
                setScore(0);
            };

            useEffect(() => {
                if (quizWords && questionIndex < quizWords.length) {
                    const current = quizWords[questionIndex];
                    const wrongOptions = N3_VOCABULARY.filter(w => w.id !== current.id).sort(() => 0.5 - Math.random()).slice(0, 3);
                    setOptions([...wrongOptions, current].sort(() => 0.5 - Math.random()));
                    setSelectedAnswer(null);
                }
            }, [quizWords, questionIndex]);

            const handleAnswer = (option) => {
                if (selectedAnswer) return;
                setSelectedAnswer(option);
                if (option.id === quizWords[questionIndex].id) setScore(prev => prev + 1);
                setTimeout(() => setQuestionIndex(prev => prev + 1), 1200);
            };

            if (!quizWords) {
                return (
                    <div className="p-4 md:p-8 space-y-6 animate-fade-in">
                        <h2 className="text-2xl font-bold text-slate-800">Chọn bài ôn tập</h2>
                        <button onClick={() => startQuiz('learning')} className="w-full max-w-2xl bg-red-50 p-6 rounded-3xl border border-red-200 shadow-sm flex items-center space-x-6 text-left hover:shadow-md hover:bg-red-100 active:scale-95 transition-all">
                            <div className="bg-red-200 p-4 rounded-full text-red-700"><IconBrain size={32} /></div>
                            <div>
                                <h3 className="text-xl font-bold text-red-800">Ôn tập các từ "Chưa nhớ"</h3>
                                <p className="text-red-600 mt-1">Hệ thống sẽ xoáy sâu vào lỗ hổng kiến thức của bạn</p>
                            </div>
                        </button>

                        <h3 className="text-xl font-bold text-slate-800 pt-4">Ôn theo từng bài</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                            {LESSONS.map(lesson => {
                                const hasWords = N3_VOCABULARY.some(w => w.lesson === lesson);
                                return (
                                    <button 
                                        key={lesson} 
                                        onClick={() => startQuiz(lesson)} 
                                        className={`bg-white p-5 rounded-2xl border ${hasWords ? 'border-slate-200 shadow-sm hover:border-indigo-400 hover:shadow-md hover:-translate-y-1' : 'border-slate-100 opacity-50'} text-center font-bold text-slate-700 active:scale-95 transition-all`}
                                    >
                                        Ôn Bài {lesson}
                                    </button>
                                )
                            })}
                        </div>
                    </div>
                );
            }

            if (questionIndex >= quizWords.length) {
                return (
                    <div className="flex flex-col items-center justify-center h-full space-y-6 text-center animate-fade-in p-4">
                        <div className="text-yellow-400 drop-shadow-md"><IconTrophy size={100} /></div>
                        <h2 className="text-4xl font-bold text-slate-800">Tuyệt vời!</h2>
                        <p className="text-xl text-slate-600">Bạn đã làm đúng <span className="font-bold text-indigo-600 text-2xl">{score} / {quizWords.length}</span> câu</p>
                        <button onClick={() => setQuizWords(null)} className="px-8 py-4 bg-indigo-600 text-white rounded-full font-bold mt-4 shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">Hoàn tất</button>
                    </div>
                );
            }

            const currentWord = quizWords[questionIndex];
            return (
                <div className="flex flex-col py-4 space-y-6 p-4 md:p-8">
                    <div className="w-full max-w-2xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <button onClick={() => setQuizWords(null)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-full"><IconArrowLeft /></button>
                        <div className="flex-1 px-6">
                            <div className="w-full bg-slate-100 rounded-full h-2">
                                <div className="bg-indigo-500 h-2 rounded-full transition-all" style={{width: `${(questionIndex / quizWords.length) * 100}%`}}></div>
                            </div>
                        </div>
                        <span className="text-lg font-bold text-indigo-600">Điểm: {score}</span>
                    </div>

                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-md border border-slate-100 p-10 text-center mt-4">
                        <p className="text-slate-400 mb-4 font-medium tracking-wide uppercase">Chọn nghĩa đúng nhất</p>
                        <h2 className="text-6xl font-bold text-slate-800 mb-4">{currentWord?.kanji}</h2>
                        <p className="text-xl text-slate-500">{currentWord?.kana}</p>
                    </div>

                    <div className="w-full max-w-2xl grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                        {options.map((option, index) => {
                            let btnClass = "w-full p-6 rounded-2xl border-2 text-lg font-medium transition-all duration-200 text-center ";
                            if (!selectedAnswer) btnClass += "border-slate-200 bg-white text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 hover:shadow-md";
                            else if (option.id === currentWord.id) btnClass += "border-green-500 bg-green-50 text-green-700";
                            else if (selectedAnswer.id === option.id) btnClass += "border-red-500 bg-red-50 text-red-700";
                            else btnClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";

                            return <button key={index} onClick={() => handleAnswer(option)} className={btnClass} disabled={selectedAnswer !== null}>{option.meaning}</button>;
                        })}
                    </div>
                </div>
            );
        };

        const PracticeTab = () => {
            const [currentWord, setCurrentWord] = useState(null);
            const [inputText, setInputText] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [result, setResult] = useState(null);

            const pickRandomWord = () => {
                const randomIdx = Math.floor(Math.random() * N3_VOCABULARY.length);
                setCurrentWord(N3_VOCABULARY[randomIdx]);
                setInputText('');
                setResult(null);
            };

            useEffect(() => { pickRandomWord(); }, []);

            const handleCheckSentence = async () => {
                if (!inputText.trim()) return;
                setIsLoading(true);
                setResult(null);

                const apiKey = "";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const prompt = `Từ vựng yêu cầu: ${currentWord.kanji} (${currentWord.kana} - ${currentWord.meaning}).
                Câu của học viên: "${inputText}"`;

                const systemInstruction = `Bạn là Thầy Sonkuro, giáo viên tiếng Nhật N3 xuất sắc. Nhận xét câu học viên theo định dạng JSON. SCHEMA: {"isCorrect": boolean, "feedback": "nhận xét tiếng Việt ngắn gọn, dễ hiểu", "correctedSentence": "câu sửa lại cho tự nhiên"}`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { responseMimeType: "application/json" }
                };

                try {
                    if(!apiKey) throw new Error("Chưa có API Key"); 
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error("Lỗi mạng");
                    const data = await response.json();
                    setResult(JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text));
                } catch (error) {
                    setResult({ 
                        isCorrect: false, 
                        feedback: "Tính năng AI đang tạm bảo trì hoặc thiếu API Key. Khi có kết nối, hệ thống sẽ tự động phân tích và chỉ ra lỗi sai ngữ pháp cho bạn!", 
                        correctedSentence: `${currentWord.example}` 
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            if (!currentWord) return null;

            return (
                <div className="flex flex-col py-4 space-y-6 p-4 md:p-8">
                    <div className="w-full max-w-2xl bg-indigo-50 border border-indigo-100 rounded-3xl p-8 text-center shadow-sm">
                        <p className="text-indigo-500 font-bold tracking-wide uppercase mb-2">Thử thách đặt câu</p>
                        <h2 className="text-5xl font-bold text-indigo-800 mb-3">{currentWord.kanji}</h2>
                        <p className="text-lg text-slate-600 font-medium">{currentWord.kana} • {currentWord.meaning}</p>
                    </div>

                    <div className="w-full max-w-2xl">
                        <textarea
                            className="w-full h-40 p-6 bg-white border border-slate-200 rounded-3xl focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 resize-none text-slate-800 text-lg shadow-sm transition-all"
                            placeholder="Nhập câu tiếng Nhật của bạn vào đây..."
                            value={inputText} onChange={(e) => setInputText(e.target.value)} disabled={isLoading || result !== null}
                        ></textarea>

                        {!result && (
                            <button
                                onClick={handleCheckSentence} disabled={isLoading || !inputText.trim()}
                                className="mt-6 w-full bg-indigo-600 text-white font-bold text-lg py-5 rounded-2xl flex items-center justify-center disabled:opacity-50 hover:bg-indigo-700 hover:shadow-lg active:scale-95 transition-all"
                            >
                                {isLoading ? <IconLoader2 className="animate-spin mr-3" size={24} /> : <IconSparkles className="mr-3" size={24} />}
                                {isLoading ? "Đang nhờ Thầy chấm bài..." : "Gửi Thầy Sonkuro chấm điểm"}
                            </button>
                        )}
                    </div>

                    {result && (
                        <div className={`w-full max-w-2xl p-6 rounded-3xl border ${result.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'} animate-fade-in shadow-sm`}>
                            <div className="flex items-center space-x-3 mb-4">
                                {result.isCorrect ? <IconCheckCircle className="text-green-600" size={32} /> : <IconX className="text-red-600" size={32} />}
                                <h3 className={`font-bold text-2xl ${result.isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                    {result.isCorrect ? "Câu trả lời rất xuất sắc!" : "Cần chỉnh sửa một chút nhé"}
                                </h3>
                            </div>
                            <p className="text-slate-700 text-lg mb-6 leading-relaxed">{result.feedback}</p>
                            {result.correctedSentence && (
                                <div className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                                    <p className="text-sm text-slate-400 mb-2 font-medium uppercase">Câu mẫu tự nhiên hơn:</p>
                                    <p className="text-indigo-800 text-xl font-bold">{result.correctedSentence}</p>
                                </div>
                            )}
                            <button onClick={pickRandomWord} className="mt-6 w-full bg-white border-2 border-slate-200 text-slate-700 font-bold text-lg py-4 rounded-2xl hover:bg-slate-50 hover:border-slate-300 active:scale-95 transition-all">Luyện câu tiếp theo</button>
                        </div>
                    )}
                </div>
            );
        };

        const ListTab = ({ wordStatus }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filter, setFilter] = useState('all');

            const filteredWords = N3_VOCABULARY.filter(word => {
                const matchSearch = word.kanji.includes(searchTerm) || word.kana.includes(searchTerm) || word.meaning.toLowerCase().includes(searchTerm.toLowerCase());
                const status = wordStatus[word.id] || 'unseen';
                if (filter === 'known') return matchSearch && status === 'known';
                if (filter === 'learning') return matchSearch && status === 'learning';
                return matchSearch;
            });

            return (
                <div className="flex flex-col py-4 space-y-6 p-4 md:p-8">
                    <div className="flex flex-col md:flex-row gap-4 items-center w-full">
                        <div className="flex p-1 bg-slate-200 rounded-xl w-full md:w-1/3">
                            {[{id:'all', label:'Tất cả'}, {id:'learning', label:'Chưa nhớ'}, {id:'known', label:'Đã nhớ'}].map(f => (
                                <button key={f.id} onClick={() => setFilter(f.id)} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${filter === f.id ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>{f.label}</button>
                            ))}
                        </div>
                        <div className="relative w-full md:w-2/3">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><IconSearch className="text-slate-400" size={20} /></div>
                            <input type="text" className="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm text-slate-700" placeholder="Tìm theo Kanji, Kana hoặc Nghĩa tiếng Việt..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>
                    </div>
                    
                    <div className="pb-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                            {filteredWords.length > 0 ? filteredWords.map((word) => (
                                <div key={word.id} className="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative hover:shadow-md transition-shadow">
                                    <div className="flex items-baseline space-x-3">
                                        <h3 className="text-2xl font-bold text-slate-800">{word.kanji}</h3>
                                        <span className="text-base text-slate-500">{word.kana}</span>
                                    </div>
                                    <p className="text-slate-700 font-medium mt-2 text-lg">{word.meaning}</p>
                                    <p className="text-slate-400 text-sm mt-2 italic border-l-2 border-indigo-200 pl-2">{word.example}</p>
                                    
                                    <span className="absolute bottom-5 right-5 text-xs font-bold text-slate-300">Bài {word.lesson}</span>
                                    
                                    {wordStatus[word.id] === 'known' && <span className="absolute top-5 right-5 text-xs font-bold bg-green-100 text-green-700 px-3 py-1 rounded-full">Đã nhớ</span>}
                                    {wordStatus[word.id] === 'learning' && <span className="absolute top-5 right-5 text-xs font-bold bg-red-100 text-red-700 px-3 py-1 rounded-full">Chưa nhớ</span>}
                                </div>
                            )) : (
                                <div className="col-span-full text-center py-20 text-slate-500 text-lg">Không tìm thấy từ vựng nào phù hợp.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Render ứng dụng React vào thẻ DIV có ID là "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
