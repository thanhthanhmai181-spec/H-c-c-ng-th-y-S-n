<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Có Thể Bạn Muốn Học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --jp-red: #8B0000; --jp-cream: #FDFBF7; --jp-ink: #1A1A1A; --jp-gold: #C5A059; }
        body { font-family: 'Lora', 'Noto Serif JP', serif; background-color: var(--jp-cream); color: var(--jp-ink); }
        .washi-pattern { background-color: var(--jp-cream); background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); }
        .card-recommended { background: linear-gradient(145deg, #1a1a2e, #16213e); border: 2px solid var(--jp-gold); box-shadow: 6px 6px 0px var(--jp-ink); transition: all 0.3s ease; }
        .card-recommended:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--jp-ink), 0 0 40px rgba(197, 160, 89, 0.4); border-color: #D4AF6A; }
    </style>
</head>
<body class="washi-pattern flex flex-col p-4 md:p-6">

    <div id="sync-alert" class="max-w-6xl mx-auto w-full mb-6 p-4 bg-amber-50 border-2 border-dashed border-amber-500 text-amber-800 rounded-lg flex items-center justify-between shadow-sm">
        <p id="sync-text" class="text-sm font-bold">⚠️ Trạng thái: Chưa đồng bộ tài khoản HIGHUB. Tiến trình tích lũy học thức không được ghi nhận!</p>
    </div>

    <main class="max-w-6xl mx-auto w-full flex-grow">
        <button onclick="window.parent.postMessage({type: 'HIGHUB_FRAME_NAVIGATE', url: ''}, '*')" class="mb-4 font-bold text-sm text-gray-800 hover:text-amber-600 transition">← Đóng Mục Kiến Thức</button>

        <section class="mb-12 flex flex-col md:flex-row items-stretch gap-10 bg-white p-8 border-4 border-[#1A1A1A] relative shadow-[8px_8px_0px_#8B0000]">
            <div class="flex-1 flex flex-col justify-center text-center md:text-left">
                <h1 class="text-4xl font-black text-[#1A1A1A] mb-4">Sổ Tay Kiến Thức Thực Tế</h1>
                <p class="text-gray-700 italic border-l-4 border-[#8B0000] pl-5 leading-relaxed bg-gray-50/50 py-2">"Tổng hợp từ kinh nghiệm thực tế của chính thầy Sơn. Hãy đọc kỹ, ghi nhớ và áp dụng ngay để sống tốt hơn tại Nhật!"</p>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button onclick="requestNavigation('bo-tro-so-dem.html')" class="text-left block card-recommended p-8 rounded-lg w-full">
                <h3 class="text-xl font-black text-white" style="font-family: 'Rajdhani', sans-serif;">SỔ TAY SỐ ĐẾM TOÀN TẬP</h3>
                <p class="text-[#C5A059] text-xs font-bold mb-4">SỐ ĐẾM · NGỮ PHÁP</p>
                <p class="text-gray-400 text-sm">Tổng hợp bảng counter chi tiết: đếm người, vật, tuổi, thời gian, tiền bạc mượt mà.</p>
            </button>

            <button onclick="requestNavigation('bo-tro-tu-tha-dong-tu.html')" class="text-left block card-recommended p-8 rounded-lg w-full">
                <h3 class="text-xl font-black text-white" style="font-family: 'Rajdhani', sans-serif;">SỔ TAY TỰ - THA ĐỘNG TỪ</h3>
                <p class="text-[#C5A059] text-xs font-bold mb-4">ĐỘNG TỪ · NGỮ PHÁP</p>
                <p class="text-gray-400 text-sm">Phân biệt tự động từ và tha động từ với bảng so sánh 70 cặp từ phổ biến nhất.</p>
            </button>

            <button onclick="requestNavigation('bo-tro-tro-tu.html')" class="text-left block card-recommended p-8 rounded-lg w-full">
                <h3 class="text-xl font-black text-white" style="font-family: 'Rajdhani', sans-serif;">BÍ KÍP LÀM CHỦ TRỢ TỪ</h3>
                <p class="text-[#C5A059] text-xs font-bold mb-4">TRỢ TỪ · CỐT LÕI</p>
                <p class="text-gray-400 text-sm">Hệ thống hóa cách xử lý chuẩn xác cấu trúc trợ từ nền tảng は, が, を, に, で.</p>
            </button>
        </div>
    </main>

    <script>
        function requestNavigation(url) { window.parent.postMessage({ type: 'HIGHUB_FRAME_NAVIGATE', url: url }, '*'); }
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message && message.type === 'HIGHUB_AUTH_SYNC') {
                const auth = message.payload;
                if (auth.isLoggedIn) {
                    document.getElementById('sync-alert').className = "max-w-6xl mx-auto w-full mb-6 p-4 bg-emerald-50 border-2 border-emerald-600 text-emerald-800 rounded-lg flex items-center justify-between shadow-sm";
                    document.getElementById('sync-text').innerText = `👹 Sư tôn nhận diện: Học viên ${auth.data.name} đã kết nối dữ liệu thư viện thành công!`;
                }
            }
        });
    </script>
</body>
</html>
