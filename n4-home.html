<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Ải N4 - Ác Quỷ Tôn Sư</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --jp-blue: #16213E; --jp-cream: #FDFBF7; --jp-ink: #1A1A1A; }
        body { font-family: 'Lora', 'Noto Serif JP', serif; background-color: var(--jp-cream); color: var(--jp-ink); }
        .washi-pattern { background-color: var(--jp-cream); background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); }
        .card-antique { background-color: #fff; border: 2px solid var(--jp-ink); box-shadow: 6px 6px 0px var(--jp-ink); transition: all 0.2s; }
        .card-antique:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--jp-blue); }
    </style>
</head>
<body class="washi-pattern flex flex-col p-4 md:p-6">

    <div id="sync-alert" class="max-w-6xl mx-auto w-full mb-6 p-4 bg-amber-50 border-2 border-dashed border-amber-500 text-amber-800 rounded-lg flex items-center justify-between shadow-sm">
        <p id="sync-text" class="text-sm font-bold">👹 Trạng thái: Chưa đồng bộ tài khoản HIGHUB. Tiến độ tu luyện N4 của ngươi sẽ bị hủy bỏ!</p>
    </div>

    <main class="max-w-4xl mx-auto w-full flex-grow">
        <button onclick="window.parent.postMessage({type: 'HIGHUB_FRAME_NAVIGATE', url: ''}, '*')" class="mb-4 font-bold text-sm text-gray-800 hover:text-blue-700 transition">← Rời Khỏi Đạo Tràng N4</button>

        <section class="mb-12 flex flex-col md:flex-row items-stretch gap-10 bg-white p-8 border-4 border-[#1A1A1A] relative shadow-[8px_8px_0px_#16213E]">
            <div class="w-48 h-48 flex-shrink-0 border-4 border-[#16213E] rounded-full bg-[#1A1A2E] mx-auto md:mx-0 flex items-center justify-center"><span class="text-white text-5xl font-black">N4</span></div>
            <div class="flex-1 flex flex-col justify-center text-center md:text-left">
                <h1 class="text-4xl font-black text-[#1A1A1A] mb-4">Cửa Ải Rèn Đúc N4</h1>
                <p class="text-gray-700 italic border-l-4 border-[#16213E] pl-5 leading-relaxed bg-gray-50/50 py-2">"N4 mới là hố sâu thực sự. Ở đây, ta sẽ tôi luyện ngươi bằng những ngữ pháp phức tạp và hàng tá Hán tự khó nhằn. Kẻ yếu đuối hãy quay đầu ngay bây giờ!"</p>
            </div>
        </section>

        <div class="flex flex-wrap justify-center gap-6">
            <button onclick="requestNavigation('n4-tu-vung.html')" class="text-left card-antique p-8 flex flex-col items-center text-center w-full sm:w-[calc(50%-1rem)] lg:w-[calc(33.333%-1.5rem)] max-w-sm">
                <h3 class="text-xl font-bold mb-2">Từ Vựng N4</h3>
                <p class="text-xs text-gray-500">Nâng cấp kho từ vựng và tăng phản xạ đời sống.</p>
            </button>
            <button onclick="requestNavigation('n4-ngu-phap.html')" class="text-left card-antique p-8 flex flex-col items-center text-center w-full sm:w-[calc(50%-1rem)] lg:w-[calc(33.333%-1.5rem)] max-w-sm">
                <h3 class="text-xl font-bold mb-2">Ngữ Pháp N4</h3>
                <p class="text-xs text-gray-500">Làm chủ thể bị động, sai khiến, tôn kính ngữ.</p>
            </button>
            <button onclick="requestNavigation('n4-han-tu.html')" class="text-left card-antique p-8 flex flex-col items-center text-center w-full sm:w-[calc(50%-1rem)] lg:w-[calc(33.333%-1.5rem)] max-w-sm">
                <h3 class="text-xl font-bold mb-2">Hán Tự N4</h3>
                <p class="text-xs text-gray-500">Bẻ khóa ma trận của hơn 170 chữ Kanji mới.</p>
            </button>
            <button onclick="requestNavigation('n4-chia-the.html')" class="text-left card-antique p-8 flex flex-col items-center text-center w-full sm:w-[calc(50%-1rem)] lg:w-[calc(33.333%-1.5rem)] max-w-sm">
                <h3 class="text-xl font-bold mb-2">Chia Thể Động Từ</h3>
                <p class="text-xs text-gray-500">Kỹ thuật biến hóa nâng cao siêu phức hợp.</p>
            </button>
            <button onclick="requestNavigation('n4-thi-thu.html')" class="text-left card-antique p-8 flex flex-col items-center text-center w-full sm:w-[calc(50%-1rem)] lg:w-[calc(33.333%-1.5rem)] max-w-sm">
                <h3 class="text-xl font-bold mb-2">Luyện Thi JLPT</h3>
                <p class="text-xs text-gray-500">Trải nghiệm bài kiểm tra tổng hợp áp lực lớn.</p>
            </button>
        </div>
    </main>

    <script>
        function requestNavigation(url) { window.parent.postMessage({ type: 'HIGHUB_FRAME_NAVIGATE', url: url }, '*'); }
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message && message.type === 'HIGHUB_AUTH_SYNC') {
                const auth = message.payload;
                if (auth.isLoggedIn) {
                    document.getElementById('sync-alert').className = "max-w-6xl mx-auto w-full mb-6 p-4 bg-emerald-50 border-2 border-emerald-600 text-emerald-800 rounded-lg flex items-center justify-between shadow-sm";
                    document.getElementById('sync-text').innerText = `👹 Sư tôn ghi nhận: Học viên ${auth.data.name} đã kích hoạt kết giới N4!`;
                }
            }
        });
    </script>
</body>
</html>
