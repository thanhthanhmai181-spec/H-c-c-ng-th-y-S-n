                        onClick={() => { changeSection(sec.id); window.scrollTo(0,0); }}
                        className={`px-5 py-3 text-sm font-bold border-b-2 transition-all flex items-center gap-2 ${
                          isActive ? 'border-indigo-600 text-indigo-600 bg-indigo-50/50' : 'border-transparent active:bg-slate-100'
                        }`}
                      >
                        <i className={sec.icon}></i>
                        {sec.title} 
                        <span className={`text-[11px] px-1.5 py-0.5 rounded-full ${answeredQ === totalQ ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}`}>
                          {answeredQ}/{totalQ}
                        </span>
                      </button>
                    );
                  })}
                </div>
              </header>

              <main className="max-w-3xl mx-auto p-4 pt-6">
                
                {activeSection === 'listening' && (
                  <div className="bg-slate-800 text-white p-3 rounded-xl mb-6 shadow-md border border-slate-700 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <i className="fa-solid fa-headphones text-sky-400 text-lg"></i>
                      <span className="font-bold text-sm">File Nghe Trực Tuyến</span>
                    </div>
                    <a 
                      href="https://drive.google.com/file/d/1hwveS1p3l5PTc0ZXPP9PfFIdQKRrSijc/view?usp=sharing" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="bg-indigo-500 hover:bg-indigo-600 text-white text-xs font-bold py-2 px-4 rounded-lg flex items-center gap-2 shadow-sm transition-colors"
                    >
                      <i className="fa-solid fa-play"></i> Mở Thẻ Nghe
                    </a>
                  </div>
                )}

                <div className="space-y-4">
                  {examData[activeSection].map((q, index) => (
                    <QuestionCard key={q.id} q={q} index={index} showResult={false} />
                  ))}
                </div>

                <div className="mt-8 pt-4 border-t border-slate-200">
                  <button 
                    onClick={handleSubmitRequest}
                    className="w-full bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 text-lg transition-colors"
                  >
                    <i className="fa-solid fa-check-circle"></i> Nộp Toàn Bộ Bài Thi
                  </button>
                </div>
              </main>
            </div>
          );

          const ResultsScreen = () => {
            const { totalCorrect, totalQuestions, percentage, sections } = calculateScore();
            const passed = percentage >= 60; 
            
            return (
              <div className="min-h-screen bg-slate-50 p-4 font-sans pb-20">
                <div className="max-w-3xl mx-auto">
                  
                  <div className="bg-white rounded-2xl shadow-md overflow-hidden mb-8 border border-slate-200">
                    <div className={`p-6 text-center text-white ${passed ? 'bg-green-500' : 'bg-orange-500'}`}>
                      <h1 className="text-2xl font-bold mb-1">
                        {passed ? 'Tuyệt Vời! Xin Chúc Mừng!' : 'Cố Gắng Thêm Nhé!'}
                      </h1>
                      <p className="text-white/90 text-sm">Kết quả thi JLPT N4</p>
                    </div>
                    
                    <div className="p-6 flex flex-col items-center">
                      <div className="text-center mb-6">
                        <span className="text-5xl font-black text-slate-800">{totalCorrect}</span>
                        <span className="text-2xl text-slate-400 font-bold">/{totalQuestions}</span>
                        <p className="text-xs font-bold text-slate-400 mt-1 uppercase">Câu đúng</p>
                      </div>
                      
                      <div className="w-full space-y-3 mb-6">
                        {SECTIONS.map(sec => {
                          const data = sections[sec.id];
                          return (
                            <div key={sec.id} className="bg-slate-50 p-3 rounded-lg flex items-center justify-between border border-slate-100">
                              <div className="flex items-center gap-3">
                                <i className={`${sec.icon} text-indigo-500`}></i>
                                <span className="text-sm font-bold text-slate-700">{sec.title}</span>
                              </div>
                              <div className="font-bold text-slate-800">
                                {data.correct}<span className="text-slate-400 text-xs">/{data.total}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      
                      <button 
                        onClick={() => {
                          setAnswers({});
                          setCurrentScreen('home');
                          setActiveSection('vocab');
                          setTimeLeft(SECTIONS[0].time);
                          window.scrollTo(0,0);
                        }}
                        className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-colors"
                      >
                        Làm Lại Đề Này
                      </button>
                    </div>
                  </div>

                  <div className="flex items-center gap-2 mb-4 p-2">
                    <i className="fa-solid fa-file-lines text-indigo-600 text-xl"></i>
                    <h2 className="text-lg font-bold text-slate-800">Chi Tiết Đáp Án</h2>
                  </div>
                  
                  <div className="space-y-8">
                    {SECTIONS.map(sec => (
                      <div key={sec.id}>
                        <h3 className="text-md font-bold text-slate-700 mb-4 px-2 py-1 bg-slate-200 rounded text-center">
                          {sec.title}
                        </h3>
                        {examData[sec.id].map((q, index) => (
                          <QuestionCard key={q.id} q={q} index={index} showResult={true} />
                        ))}
                      </div>
                    ))}
                  </div>

                </div>
              </div>
            );
          };

          return (
            <div className="antialiased selection:bg-indigo-200">
              {currentScreen === 'home' && <HomeScreen />}
              {currentScreen === 'exam' && <ExamScreen />}
              {currentScreen === 'results' && <ResultsScreen />}
              
              <Modal 
                isOpen={modalConfig.isOpen}
                title={modalConfig.title}
                message={modalConfig.message}
                onConfirm={modalConfig.onConfirm}
                onCancel={modalConfig.onCancel}
              />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
