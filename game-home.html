<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đạo Tràng Giải Trí - Trò Chơi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --jp-red: #8B0000; --jp-cream: #FDFBF7; --jp-ink: #1A1A1A; --game-glow: #FF6B35; }
        body { font-family: 'Lora', 'Noto Serif JP', serif; background-color: var(--jp-cream); color: var(--jp-ink); }
        .washi-pattern { background-color: var(--jp-cream); background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); }
        .game-card-active { background: linear-gradient(145deg, #1a1a2e, #16213e); border: 2px solid var(--game-glow); box-shadow: 6px 6px 0px var(--jp-ink); transition: all 0.3s ease; }
        .game-card-active:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--jp-ink), 0 0 40px rgba(255, 107, 53, 0.4); border-color: #FF8C5A; }
        .card-locked { background-color: #f5f0eb; border: 2px dashed #999; box-shadow: 4px 4px 0px #ccc; opacity: 0.7; }
    </style>
</head>
<body class="washi-pattern flex flex-col p-4 md:p-6">

    <div id="sync-alert" class="max-w-6xl mx-auto w-full mb-6 p-4 bg-amber-50 border-2 border-dashed border-amber-500 text-amber-800 rounded-lg flex items-center justify-between shadow-sm">
        <p id="sync-text" class="text-sm font-bold">⚠️ Trạng thái: Chưa đồng bộ tài khoản HIGHUB. Thành tích kỷ lục chơi game sẽ không được lưu!</p>
    </div>

    <main class="max-w-6xl mx-auto w-full flex-grow">
        <button onclick="window.parent.postMessage({type: 'HIGHUB_FRAME_NAVIGATE', url: ''}, '*')" class="mb-4 font-bold text-sm text-gray-800 hover:text-orange-600 transition">← Tắt Đạo Tràng Trò Chơi</button>

        <section class="mb-12 flex flex-col md:flex-row items-stretch gap-10 bg-white p-8 border-4 border-[#1A1A1A] relative shadow-[8px_8px_0px_#8B0000]">
            <div class="flex-1 flex flex-col justify-center text-center md:text-left">
                <h1 class="text-4xl font-black text-[#1A1A1A] mb-4">Trò Chơi Học Tập Tương Tác</h1>
                <p class="text-gray-700 italic border-l-4 border-[#8B0000] pl-5 leading-relaxed bg-gray-50/50 py-2">"Chơi mà vẫn phải học, vận dụng kiến thức linh hoạt để sinh tồn phá giải trận pháp!"</p>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button onclick="requestNavigation('game-sonkuro-drift.html')" class="text-left block game-card-active p-8 rounded-lg">
                <h3 class="text-2xl font-black text-white" style="font-family: 'Rajdhani', sans-serif;">SONKURO DRIFT</h3>
                <p class="text-[#FF6B35] text-xs font-bold mb-4">ĐUA XE · LUYỆN NGỮ PHÁP</p>
                <p class="text-gray-400 text-sm">Đua xe tốc độ cao qua phố Tokyo. Mỗi cú drift là một cấu trúc câu ngữ pháp.</p>
            </button>

            <button onclick="requestNavigation('game-hac-tong-han-tu.html')" class="text-left block game-card-active p-8 rounded-lg">
                <h3 class="text-2xl font-black text-white" style="font-family: 'Rajdhani', sans-serif;">HẠC TÔNG HÁN TỰ</h3>
                <p class="text-[#FF6B35] text-xs font-bold mb-4">SINH TỒN · KANJI PHẢN XẠ</p>
                <p class="text-gray-400 text-sm">Vận dụng ý nghĩa bộ thủ và cách đọc âm On-Kun của Kanji để vượt ải sinh tồn.</p>
            </button>

            <div class="card-locked p-8 rounded-lg text-center flex flex-col justify-center items-center">
                <h3 class="text-xl font-bold text-gray-500">🔮 BÍ MẬT BẬC CAO</h3>
                <p class="text-xs text-gray-400 mt-2 italic">Hệ thống ma trận tiếp theo đang được phát triển nâng cấp.</p>
            </div>
        </div>
    </main>

    <script>
        function requestNavigation(url) { window.parent.postMessage({ type: 'HIGHUB_FRAME_NAVIGATE', url: url }, '*'); }
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message && message.type === 'HIGHUB_AUTH_SYNC') {
                const auth = message.payload;
                if (auth.isLoggedIn) {
                    document.getElementById('sync-alert').className = "max-w-6xl mx-auto w-full mb-6 p-4 bg-emerald-50 border-2 border-emerald-600 text-emerald-800 rounded-lg flex items-center justify-between shadow-sm";
                    document.getElementById('sync-text').innerText = `👹 Hệ thống: Đã kết nối đồng bộ tài khoản game thủ ${auth.data.name}!`;
                }
            }
        });
    </script>
</body>
</html>
