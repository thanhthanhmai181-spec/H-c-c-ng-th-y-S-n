  let settings = { defaultLesson: 1 };
  
  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) srsState = JSON.parse(saved);
    vocabData.forEach(v => { if (!srsState[v.id]) srsState[v.id] = { interval:0, nextReview: new Date().toISOString().slice(0,10), efactor:2.5, repCount:0 }; });
    const savedSettings = localStorage.getItem(SETTINGS_KEY);
    if (savedSettings) settings = JSON.parse(savedSettings);
  }
  function saveSRS() { localStorage.setItem(STORAGE_KEY, JSON.stringify(srsState)); }
  function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
  function todayStr() { return new Date().toISOString().slice(0,10); }
  function shuffleArray(arr) { for (let i=arr.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
  
  const views = {
    dashboard: document.getElementById('dashboardView'),
    wordlist: document.getElementById('wordListView'),
    flashcard: document.getElementById('flashcardView'),
    quiz: document.getElementById('quizView'),
    lessons: document.getElementById('lessonsView')
  };
  function showView(name) {
    Object.keys(views).forEach(k => views[k].classList.add('hidden'));
    views[name].classList.remove('hidden');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${name}"]`)?.classList.add('active');
    if (name === 'dashboard') renderDashboard();
    else if (name === 'wordlist') renderWordList();
    else if (name === 'lessons') renderLessons();
    else if (name === 'flashcard') initFlashcardSession();
    else if (name === 'quiz') initQuizSession();
  }
  document.getElementById('tabBar').addEventListener('click', e => { const tab = e.target.closest('.tab'); if(tab && tab.dataset.tab) showView(tab.dataset.tab); });
  
  function renderDashboard() {
    const today = todayStr();
    const dueWords = vocabData.filter(v => srsState[v.id].nextReview <= today);
    const learned = vocabData.filter(v => srsState[v.id].repCount > 0).length;
    const mastered = vocabData.filter(v => srsState[v.id].repCount >= 5).length;
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-box"><div class="num">${vocabData.length}</div><div class="lbl">Tổng từ</div></div>
      <div class="stat-box"><div class="num">${learned}</div><div class="lbl">Đã học</div></div>
      <div class="stat-box"><div class="num">${mastered}</div><div class="lbl">Thành thạo</div></div>
      <div class="stat-box"><div class="num">${dueWords.length}</div><div class="lbl">Cần ôn hôm nay</div></div>
    `;
    document.getElementById('dailyMessage').textContent = dueWords.length > 0 ? `📌 Bạn có ${dueWords.length} từ cần ôn tập.` : '✨ Tất cả từ đã được ôn xong. Hãy học từ mới!';
    document.getElementById('btnStartReview').onclick = () => { const dueNow = vocabData.filter(v => srsState[v.id].nextReview <= todayStr()); if(dueNow.length===0) return alert('Không có từ nào cần ôn.'); startFlashcardSession(shuffleArray([...dueNow])); };
    document.getElementById('btnLearnNew').onclick = () => { const newWords = vocabData.filter(v => srsState[v.id].repCount===0 && v.lesson===settings.defaultLesson); if(newWords.length===0) return alert(`Bài ${settings.defaultLesson} không còn từ mới.`); startFlashcardSession(shuffleArray(newWords).slice(0,10)); };
    const select = document.getElementById('defaultLessonSelect');
    select.innerHTML = lessons.map(l => `<option value="${l.id}" ${l.id==settings.defaultLesson?'selected':''}>${l.icon} ${l.title}</option>`).join('');
    select.onchange = (e) => { settings.defaultLesson = parseInt(e.target.value); saveSettings(); };
  }
  
  function renderWordList() {
    const lessonFilter = document.getElementById('lessonFilter');
    const searchInput = document.getElementById('searchInput');
    lessonFilter.innerHTML = '<option value="all">Tất cả bài học</option>' + lessons.map(l => `<option value="${l.id}">${l.icon} ${l.title}</option>`).join('');
    function filterWords() {
      const lessonVal = lessonFilter.value;
      const searchVal = searchInput.value.toLowerCase();
      let filtered = vocabData;
      if(lessonVal !== 'all') filtered = filtered.filter(v => v.lesson == lessonVal);
      if(searchVal) filtered = filtered.filter(v => v.kanji.includes(searchVal) || v.hiragana.includes(searchVal) || v.meaning.toLowerCase().includes(searchVal));
      const container = document.getElementById('wordListContainer');
      container.innerHTML = filtered.map(v => {
        const s = srsState[v.id];
        const isDue = s.nextReview <= todayStr();
        const hasKanji = v.kanji && v.kanji !== "～" && v.kanji !== "～さん" && !v.kanji.startsWith("～") && v.kanji !== v.hiragana;
        let mainDisplay = '';
        if (hasKanji) {
          mainDisplay = `<div class="word-main">${v.kanji}</div><div class="word-reading">${v.hiragana}</div>`;
        } else {
          mainDisplay = `<div class="word-main">${v.hiragana}</div>`;
        }
        return `
          <div class="word-item">
            <div class="word-info">
              ${mainDisplay}
              <div class="word-meaning">${v.meaning}</div>
              <div class="word-sub">
                <span>${v.type}</span> · <span>Bài ${v.lesson}</span>
                <span style="color:${isDue?'#dc2626':'#16a34a'};">${isDue?'🔴 Cần ôn':'🟢 Đã ôn'}</span>
              </div>
            </div>
            <button class="speaker" onclick="speak('${(v.kanji || v.hiragana).replace(/'/g, "\\'")}')">🔊</button>
          </div>
        `;
      }).join('');
    }
    lessonFilter.onchange = filterWords;
    searchInput.oninput = filterWords;
    filterWords();
  }
  
  let flashcardQueue=[], flashcardIndex=0, currentCard=null;
  function startFlashcardSession(words){ if(!words||words.length===0) return alert('Không có từ để học.'); flashcardQueue=words; flashcardIndex=0; showView('flashcard'); }
  function initFlashcardSession(){ if(flashcardQueue.length===0||flashcardIndex>=flashcardQueue.length){ const due=vocabData.filter(v=>srsState[v.id].nextReview<=todayStr()); flashcardQueue=shuffleArray(due.length?due:vocabData.slice()); flashcardIndex=0; } if(flashcardQueue.length===0){ alert('Không có từ nào!'); showView('dashboard'); return; } showCurrentCard(); }
  function showCurrentCard(){ if(flashcardIndex>=flashcardQueue.length){ alert('🎉 Hoàn thành phiên ôn tập!'); flashcardQueue=[]; showView('dashboard'); return; } currentCard=flashcardQueue[flashcardIndex]; document.getElementById('fcFront').innerHTML=`<span>${currentCard.kanji||currentCard.hiragana}</span><br><small style="font-size:1.2rem; color:#64748b;">${currentCard.hiragana}</small>`; document.getElementById('fcBack').innerHTML=`<strong>${currentCard.meaning}</strong><br><small>${currentCard.type}</small>`; document.getElementById('flashcard').classList.remove('flipped'); document.getElementById('fcProgress').textContent=`Từ ${flashcardIndex+1}/${flashcardQueue.length} · Bài ${currentCard.lesson}`; }
  document.getElementById('flashcardContainer').addEventListener('click',()=>{ document.getElementById('flashcard').classList.toggle('flipped'); });
  function updateSRS(wordId,remembered){ const s=srsState[wordId]; if(remembered){ if(s.repCount===0) s.interval=1; else if(s.repCount===1) s.interval=3; else s.interval=Math.round(s.interval*s.efactor); s.efactor=Math.min(2.5,s.efactor+0.1); s.repCount++; }else{ s.interval=0; s.repCount=0; s.efactor=Math.max(1.3,s.efactor-0.2); } const next=new Date(); next.setDate(next.getDate()+s.interval); s.nextReview=next.toISOString().slice(0,10); saveSRS(); }
  document.getElementById('btnRemembered').onclick=()=>{ if(currentCard){ updateSRS(currentCard.id,true); flashcardIndex++; showCurrentCard(); } };
  document.getElementById('btnForgot').onclick=()=>{ if(currentCard){ updateSRS(currentCard.id,false); flashcardIndex++; showCurrentCard(); } };
  document.getElementById('btnEndFlashcard').onclick=()=>{ flashcardQueue=[]; showView('dashboard'); };
  
  let quizWord=null, quizAnswered=false;
  function initQuizSession(){ const due=vocabData.filter(v=>srsState[v.id].nextReview<=todayStr()); const pool=due.length?due:vocabData; quizWord=shuffleArray(pool)[0]; renderQuiz(); }
  function renderQuiz(){ quizAnswered=false; document.getElementById('quizQuestion').textContent=(quizWord.kanji||quizWord.hiragana)+' ('+quizWord.hiragana+')'; const wrongs=shuffleArray(vocabData.filter(v=>v.id!==quizWord.id)).slice(0,3); const options=shuffleArray([quizWord,...wrongs]); const container=document.getElementById('quizOptions'); container.innerHTML=''; options.forEach(opt=>{ const div=document.createElement('div'); div.className='quiz-option'; div.textContent=opt.meaning; div.onclick=()=>handleQuizAnswer(opt,div); container.appendChild(div); }); document.getElementById('quizFeedback').textContent=''; document.getElementById('btnNextQuiz').classList.add('hidden'); }
  function handleQuizAnswer(selected,div){ if(quizAnswered) return; quizAnswered=true; const isCorrect=selected.id===quizWord.id; if(isCorrect){ div.classList.add('correct'); updateSRS(quizWord.id,true); document.getElementById('quizFeedback').textContent='✅ Chính xác!'; }else{ div.classList.add('wrong'); document.querySelectorAll('.quiz-option').forEach(el=>{ if(el.textContent===quizWord.meaning) el.classList.add('correct'); }); updateSRS(quizWord.id,false); document.getElementById('quizFeedback').textContent='❌ Sai rồi! Đáp án đúng: '+quizWord.meaning; } document.getElementById('btnNextQuiz').classList.remove('hidden'); }
  document.getElementById('btnNextQuiz').onclick=()=>{ const due=vocabData.filter(v=>srsState[v.id].nextReview<=todayStr()); const pool=due.length?due:vocabData; quizWord=shuffleArray(pool)[0]; renderQuiz(); };
  
  function renderLessons(){
    const container=document.getElementById('lessonsContainer');
    container.innerHTML=lessons.map(l=>{ const wordsInLesson=vocabData.filter(v=>v.lesson===l.id); const learned=wordsInLesson.filter(v=>srsState[v.id].repCount>0).length; const due=wordsInLesson.filter(v=>srsState[v.id].nextReview<=todayStr()).length; return `<div class="card" style="display:flex; align-items:center; gap:14px;"><div style="font-size:2rem;">${l.icon}</div><div style="flex:1;"><h3>${l.title}</h3><div style="font-size:0.9rem; color:#64748b;">${wordsInLesson.length} từ · Đã học ${learned} · Cần ôn ${due}</div></div><div><button class="btn btn-sm btn-outline" data-lesson="${l.id}" data-type="new">🆕 5 từ mới</button><button class="btn btn-sm" data-lesson="${l.id}" data-type="review" style="margin-top:4px;">🔄 Ôn</button></div></div>`; }).join('');
    document.querySelectorAll('#lessonsContainer button').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const lessonId=parseInt(btn.dataset.lesson); const type=btn.dataset.type; if(type==='new'){ const newWords=vocabData.filter(v=>v.lesson===lessonId && srsState[v.id].repCount===0); if(newWords.length===0) return alert(`Bài ${lessonId} không còn từ mới!`); startFlashcardSession(shuffleArray(newWords).slice(0,5)); } else if(type==='review'){ const dueWordsLesson=vocabData.filter(v=>v.lesson===lessonId && srsState[v.id].nextReview<=todayStr()); if(dueWordsLesson.length===0) return alert(`Bài ${lessonId} không có từ cần ôn.`); startFlashcardSession(shuffleArray(dueWordsLesson)); } }); });
  }
  
  window.speak=function(text){ if(!window.speechSynthesis) return; const utterance=new SpeechSynthesisUtterance(text); utterance.lang='ja-JP'; utterance.rate=0.9; window.speechSynthesis.cancel(); window.speechSynthesis.speak(utterance); };
  document.getElementById('speakFront').addEventListener('click',(e)=>{ e.stopPropagation(); if(currentCard) speak(currentCard.kanji||currentCard.hiragana); });
  document.getElementById('speakBack').addEventListener('click',(e)=>{ e.stopPropagation(); if(currentCard) speak(currentCard.kanji||currentCard.hiragana); });
  
  loadData();
  renderDashboard();
  showView('dashboard');
</script>
</body>
</html>
