<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Ải N5 - Ác Quỷ Tôn Sư</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --jp-red: #8B0000; --jp-cream: #FDFBF7; --jp-ink: #1A1A1A; }
        body { font-family: 'Lora', 'Noto Serif JP', serif; background-color: var(--jp-cream); color: var(--jp-ink); }
        .washi-pattern { background-color: var(--jp-cream); background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); }
        .card-antique { background-color: #fff; border: 2px solid var(--jp-ink); box-shadow: 6px 6px 0px var(--jp-ink); transition: all 0.2s; }
        .card-antique:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--jp-red); }
        .tategaki { writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.2em; }
        @media (min-width: 1024px) {
            .grid-custom { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2rem; }
            .grid-custom > button { grid-column: span 2; }
            .grid-custom > button:nth-child(4) { grid-column: 2 / span 2; }
            .grid-custom > button:nth-child(5) { grid-column: 4 / span 2; }
        }
    </style>
</head>
<body class="washi-pattern flex flex-col p-4 md:p-6">

    <div id="sync-alert" class="max-w-6xl mx-auto w-full mb-6 p-4 bg-amber-50 border-2 border-dashed border-amber-500 text-amber-800 rounded-lg flex items-center justify-between shadow-sm">
        <p id="sync-text" class="text-sm font-bold">👹 Trạng thái: Chưa đồng bộ tài khoản HIGHUB. Tiến độ tu luyện N5 của ngươi sẽ không được ghi nhận!</p>
    </div>

    <main class="max-w-6xl mx-auto w-full flex-grow">
        <!-- Nút quay lại điều hướng mẹ thông minh -->
        <button onclick="window.parent.postMessage({type: 'HIGHUB_FRAME_NAVIGATE', url: ''}, '*')" class="mb-4 font-bold text-sm text-gray-800 hover:text-red-700 transition">← Rời Khỏi Đạo Tràng N5</button>

        <section class="mb-12 flex flex-col md:flex-row items-stretch gap-10 bg-white p-8 border-4 border-[#1A1A1A] relative shadow-[8px_8px_0px_#8B0000]">
            <div class="w-48 h-48 flex-shrink-0 border-4 border-[#8B0000] rounded-full bg-[#1A0000] mx-auto md:mx-0 flex items-center justify-center">
                <span class="text-white text-5xl font-black">N5</span>
            </div>
            <div class="flex-1 flex flex-col justify-center text-center md:text-left">
                <h1 class="text-4xl font-black text-[#1A1A1A] mb-4">Cửa Ải Nhập Môn N5</h1>
                <p class="text-gray-700 italic border-l-4 border-[#8B0000] pl-5 leading-relaxed bg-gray-50/50 py-2">"N5 là nền móng của tòa tháp. Kẻ xây móng trên cát sẽ bị ta nghiền nát ngay từ bước đầu tiên! Hãy chọn một cuốn bí kíp bên dưới và bắt đầu tu luyện!"</p>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-custom gap-6">
            <button onclick="requestNavigation('n5-nhap-mon.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <div class="w-12 h-12 border-2 border-black rounded-full flex items-center justify-center font-bold text-xl mb-4 bg-gray-50">仮</div>
                <h3 class="text-xl font-bold mb-2">Nhập Môn Chữ Cái</h3>
                <p class="text-sm text-gray-500 flex-grow">Hiragana và Katakana. Nét chữ đầu tiên quyết định sinh tử.</p>
            </button>
            <button onclick="requestNavigation('n5-tu-vung.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <div class="w-12 h-12 border-2 border-black rounded-full flex items-center justify-center font-bold text-xl mb-4 bg-gray-50">詞</div>
                <h3 class="text-xl font-bold mb-2">Từ Vựng N5</h3>
                <p class="text-sm text-gray-500 flex-grow">Vũ khí để sinh tồn. Càng nhớ nhiều, kiếm của ngươi càng sắc bén.</p>
            </button>
            <button onclick="requestNavigation('n5-ngu-phap.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <div class="w-12 h-12 border-2 border-black rounded-full flex items-center justify-center font-bold text-xl mb-4 bg-gray-50">法</div>
                <h3 class="text-xl font-bold mb-2">Ngữ Pháp N5</h3>
                <p class="text-sm text-gray-500 flex-grow">Luật lệ kẻ mạnh. Ghép từ vựng thành những đòn tấn công chí mạng.</p>
            </button>
            <button onclick="requestNavigation('n5-han-tu.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <div class="w-12 h-12 border-2 border-black rounded-full flex items-center justify-center font-bold text-xl mb-4 bg-gray-50">漢</div>
                <h3 class="text-xl font-bold mb-2">Hán Tự N5</h3>
                <p class="text-sm text-gray-500 flex-grow">Mật mã cổ xưa. Không làm chủ nó, ngươi mãi chỉ là kẻ mù chữ.</p>
            </button>
            <button onclick="requestNavigation('n5-chia-the.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <div class="w-12 h-12 border-2 border-black rounded-full flex items-center justify-center font-bold text-xl mb-4 bg-gray-50">変</div>
                <h3 class="text-xl font-bold mb-2">Chia Thể Động Từ</h3>
                <p class="text-sm text-gray-500 flex-grow">Nghệ thuật biến hóa giúp xoay chuyển cục diện trận đấu.</p>
            </button>
        </div>
    </main>

    <script>
        function requestNavigation(url) { window.parent.postMessage({ type: 'HIGHUB_FRAME_NAVIGATE', url: url }, '*'); }
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message && message.type === 'HIGHUB_AUTH_SYNC') {
                const auth = message.payload;
                const alertBox = document.getElementById('sync-alert');
                const text = document.getElementById('sync-text');
                if (auth.isLoggedIn) {
                    alertBox.className = "max-w-6xl mx-auto w-full mb-6 p-4 bg-emerald-50 border-2 border-emerald-600 text-emerald-800 rounded-lg flex items-center justify-between shadow-sm";
                    text.innerText = `👹 Sư tôn nhận diện: Học viên ${auth.data.name} đã đồng bộ kết nối HIGHUB thành công!`;
                }
            }
        });
    </script>
</body>
</html>
