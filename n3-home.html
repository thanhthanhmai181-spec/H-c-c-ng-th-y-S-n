<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Ải N3 - Ác Quỷ Tôn Sư</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --jp-red: #8B0000; --jp-cream: #FDFBF7; --jp-ink: #1A1A1A; }
        body { font-family: 'Lora', 'Noto Serif JP', serif; background-color: var(--jp-cream); color: var(--jp-ink); }
        .washi-pattern { background-color: var(--jp-cream); background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); }
        .card-antique { background-color: #fff; border: 2px solid var(--jp-ink); box-shadow: 6px 6px 0px var(--jp-ink); transition: all 0.2s; }
        .card-antique:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--jp-red); }
    </style>
</head>
<body class="washi-pattern flex flex-col p-4 md:p-6">

    <div id="sync-alert" class="max-w-6xl mx-auto w-full mb-6 p-4 bg-amber-50 border-2 border-dashed border-amber-500 text-amber-800 rounded-lg flex items-center justify-between shadow-sm">
        <p id="sync-text" class="text-sm font-bold">👹 Trạng thái: Chưa đồng bộ tài khoản HIGHUB. Tiến độ bài học N3 sẽ không được lưu!</p>
    </div>

    <main class="max-w-6xl mx-auto w-full flex-grow">
        <button onclick="window.parent.postMessage({type: 'HIGHUB_FRAME_NAVIGATE', url: ''}, '*')" class="mb-4 font-bold text-sm text-gray-800 hover:text-red-700 transition">← Rời Khỏi Đạo Tràng N3</button>

        <section class="mb-12 flex flex-col md:flex-row items-stretch gap-10 bg-white p-8 border-4 border-[#1A1A1A] relative shadow-[8px_8px_0px_#8B0000]">
            <div class="w-48 h-48 flex-shrink-0 border-4 border-[#8B0000] rounded-full bg-[#1A0000] mx-auto md:mx-0 flex items-center justify-center"><span class="text-white text-5xl font-black">N3</span></div>
            <div class="flex-1 flex flex-col justify-center text-center md:text-left">
                <h1 class="text-4xl font-black text-[#1A1A1A] mb-4">Cửa Ải Trung Cấp N3</h1>
                <p class="text-gray-700 italic border-l-4 border-[#8B0000] pl-5 leading-relaxed bg-gray-50/50 py-2">"N3 là ranh giới giữa kẻ nghiệp dư và một chiến binh thực thụ. Chuẩn bị tinh thần đón nhận những thử thách khốc liệt nhất!"</p>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <button onclick="requestNavigation('n3-tu-vung.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <h3 class="text-xl font-bold mb-2">Từ Vựng N3</h3>
                <p class="text-sm text-gray-500">Hệ thống từ vựng sâu sắc chuyên ngành và đời sống nâng cao.</p>
            </button>
            <button onclick="requestNavigation('n3-ngu-phap.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <h3 class="text-xl font-bold mb-2">Ngữ Pháp N3</h3>
                <p class="text-sm text-gray-500">Trận pháp văn phong phức tạp biến hóa khôn lường.</p>
            </button>
            <button onclick="requestNavigation('n3-han-tu.html')" class="text-left card-antique p-8 flex flex-col items-center text-center">
                <h3 class="text-xl font-bold mb-2">Hán Tự N3</h3>
                <p class="text-sm text-gray-500">Chân ngôn chữ viết cốt lõi độc bản của người bản xứ.</p>
            </button>
        </div>
    </main>

    <script>
        function requestNavigation(url) { window.parent.postMessage({ type: 'HIGHUB_FRAME_NAVIGATE', url: url }, '*'); }
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message && message.type === 'HIGHUB_AUTH_SYNC') {
                const auth = message.payload;
                if (auth.isLoggedIn) {
                    document.getElementById('sync-alert').className = "max-w-6xl mx-auto w-full mb-6 p-4 bg-emerald-50 border-2 border-emerald-600 text-emerald-800 rounded-lg flex items-center justify-between shadow-sm";
                    document.getElementById('sync-text').innerText = `👹 Sư tôn nhận diện: Học viên ${auth.data.name} chính thức tiến vào đại điện N3!`;
                }
            }
        });
    </script>
</body>
</html>
